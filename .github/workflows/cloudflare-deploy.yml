name: Cloudflare - Deploy

on:
  workflow_dispatch:
    inputs:
      resource:
        description: Which resource under terraform/cloudflare/ to apply
        required: true
        type: choice
        options:
          - dns/private/adguard
          - dns/private/crowdsec-web-ui
          - dns/private/data-source-connector-example
          - dns/private/headlamp
          - dns/private/nfs
          - dns/private/portainer
          - dns/private/postgres
          - dns/private/playwright-mcp
          - dns/private/private-home-page
          - dns/private/proxmox
          - dns/private/rabbitmq
          - dns/private/redis
          - dns/private/traefik
          - dns/private/vault
          - shared/cloudflare-email
          - shared/zero-trust

jobs:
  deploy:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: terraform
    env:
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: extractions/setup-just@v2
      - run: just deploy cloudflare "${{ inputs.resource }}"