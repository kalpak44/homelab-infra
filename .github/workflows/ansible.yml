name: Ansible

on:
  workflow_dispatch:
    inputs:
      inventory:
        description: "Inventory to target"
        required: true
        default: common
        type: choice
        options: [common, dev, prod]
      playbook:
        description: "Playbook to run"
        required: true
        default: adguard
        type: choice
        options: [adguard, bootstrap, docker, k3s]

jobs:
  run:
    name: "${{ inputs.playbook }} / ${{ inputs.inventory }}"
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Run playbook
        run: |
          ansible-playbook \
            -i ansible/inventories/${{ inputs.inventory }}.yml \
            ansible/playbooks/${{ inputs.playbook }}.yml