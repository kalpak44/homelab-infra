name: Ansible

on:
  workflow_dispatch:
    inputs:
      inventory:
        description: "Inventory to target"
        required: true
        default: common
        type: choice
        options: [common, dev, prod]
      playbook:
        description: "Playbook to run"
        required: true
        default: adguard
        type: choice
        options: [adguard, vault, docker, postgresql, pgadmin, redis, microk8s]

jobs:
  run:
    name: "${{ inputs.playbook }} / ${{ inputs.inventory }}"
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Install Python deps for Ansible filters
        run: sudo apt-get install -y python3-passlib

      - name: Run playbook
        working-directory: ansible
        run: |
          ansible-playbook \
            -i inventories/${{ inputs.inventory }}.yml \
            playbooks/${{ inputs.playbook }}.yml \
            -e adguard_username="${{ secrets.ADGUARD_USERNAME }}" \
            -e adguard_password="${{ secrets.ADGUARD_PASSWORD }}" \
            -e vault_username="${{ secrets.VAULT_USERNAME }}" \
            -e vault_password="${{ secrets.VAULT_PASSWORD }}" \
            -e postgresql_db="${{ secrets.POSTGRESQL_DB }}" \
            -e postgresql_user="${{ secrets.POSTGRESQL_USER }}" \
            -e postgresql_password="${{ secrets.POSTGRESQL_PASSWORD }}" \
            -e pgadmin_email="${{ secrets.PGADMIN_EMAIL }}" \
            -e pgadmin_password="${{ secrets.PGADMIN_PASSWORD }}" \
            -e redis_password="${{ secrets.REDIS_PASSWORD }}" \
            -e redis_commander_user="${{ secrets.REDIS_COMMANDER_USER }}" \
            -e redis_commander_password="${{ secrets.REDIS_COMMANDER_PASSWORD }}"