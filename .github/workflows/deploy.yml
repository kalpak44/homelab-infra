name: Deploy Service

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Service to deploy"
        required: true
        type: choice
        options:
          - all
          - proxmox-dns
          - adguard
          - vault
          - postgresql
          - redis
          - haproxy
          - nfs
          - k3s
          - k3s/flux

jobs:
  deploy:
    name: Deploy / ${{ inputs.service }}
    runs-on: self-hosted
    environment: ${{ contains(fromJSON('["haproxy","nfs","k3s","k3s/flux"]'), inputs.service) && 'prod' || 'common' }}
    permissions:
      contents: write

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_ENDPOINT_URL_S3: ${{ secrets.R2_ENDPOINT }}
      TF_VAR_ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Terraform Init
        if: inputs.service != 'k3s/flux'
        working-directory: terraform
        run: terraform init -backend-config="bucket=${{ secrets.R2_BUCKET_NAME }}"

      - name: Terraform Apply
        if: inputs.service != 'k3s/flux'
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var proxmox_endpoint="${{ secrets.PROXMOX_ENDPOINT }}" \
            -var proxmox_username="${{ secrets.PROXMOX_USERNAME }}" \
            -var proxmox_password="${{ secrets.PROXMOX_PASSWORD }}" \
            -var ssh_public_key="${{ secrets.SSH_PUBLIC_KEY }}" \
            -var cloudflare_api_token="${{ secrets.CLOUDFLARE_API_TOKEN }}"

      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Install Python deps
        run: sudo apt-get install -y python3-passlib

      - name: Run Ansible
        if: inputs.service != 'proxmox-dns'
        working-directory: ansible
        run: |
          run_playbook() {
            local pb=$1 inv=$2
            ansible-playbook \
              -i inventories/$inv.yml \
              playbooks/$pb.yml \
              -e adguard_username="${{ secrets.ADGUARD_USERNAME }}" \
              -e adguard_password="${{ secrets.ADGUARD_PASSWORD }}" \
              -e adguard_cert_email="${{ secrets.LETSENCRYPT_EMAIL }}" \
              -e vault_username="${{ secrets.VAULT_USERNAME }}" \
              -e vault_password="${{ secrets.VAULT_PASSWORD }}" \
              -e postgresql_db="${{ secrets.POSTGRESQL_DB }}" \
              -e postgresql_user="${{ secrets.POSTGRESQL_USER }}" \
              -e postgresql_password="${{ secrets.POSTGRESQL_PASSWORD }}" \
              -e pgadmin_email="${{ secrets.PGADMIN_EMAIL }}" \
              -e pgadmin_password="${{ secrets.PGADMIN_PASSWORD }}" \
              -e redis_password="${{ secrets.REDIS_PASSWORD }}" \
              -e redis_commander_user="${{ secrets.REDIS_COMMANDER_USER }}" \
              -e redis_commander_password="${{ secrets.REDIS_COMMANDER_PASSWORD }}" \
              -e haproxy_stats_user="${{ secrets.HAPROXY_STATS_USER }}" \
              -e haproxy_stats_password="${{ secrets.HAPROXY_STATS_PASSWORD }}" \
              -e flux_github_token="${{ secrets.FLUX_GITHUB_TOKEN }}" \
              -e cloudflare_api_token="${{ secrets.CLOUDFLARE_API_TOKEN }}"
          }

          case "${{ inputs.service }}" in
            all)
              for pb in adguard vault postgresql pgadmin redis; do run_playbook $pb common; done
              for pb in haproxy nfs k3s; do run_playbook $pb prod; done
              ;;
            haproxy|nfs|k3s)  run_playbook ${{ inputs.service }} prod ;;
            k3s/flux)          run_playbook flux prod ;;
            *)                 run_playbook ${{ inputs.service }} common ;;
          esac