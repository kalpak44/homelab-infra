name: Deploy Service

on:
  workflow_dispatch:
    inputs:
      refresh:
        description: "Refresh Terraform state before apply"
        required: false
        type: boolean
        default: true
      service:
        description: "Service to deploy"
        required: true
        type: choice
        options:
          - all
          - proxmox-dns
          - adguard
          - vault
          - postgres
          - redis
          - rabbitmq
          - portainer
          - haproxy
          - nfs
          - k3s
          - k3s/flux
          - k3s/flux/personal-web-page
          - k3s/flux/private-home-page
          - k3s/flux/mite-assistant-mcp
          - k3s/flux/crowdsec-web-ui
          - k3s/flux/traefik
          - k3s/flux/headlamp
          - k3s/flux/capacity-planner
          - k3s/flux/shopify-gpt-assistant
          - k3s/flux/bunker-game-app
          - cloudflare-email

jobs:
  deploy:
    name: Deploy / ${{ inputs.service }}
    runs-on: self-hosted
    permissions:
      contents: write

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_ENDPOINT_URL_S3: ${{ secrets.R2_ENDPOINT }}
      TF_VAR_ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
      TF_REFRESH_FLAG: ${{ inputs.refresh == false && '-refresh=false' || '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Terraform Init
        if: inputs.service != 'k3s/flux'
        working-directory: terraform
        run: terraform init -backend-config="bucket=${{ secrets.R2_BUCKET_NAME }}"

      - name: Terraform Apply
        if: inputs.service != 'k3s/flux' && inputs.service != 'k3s/flux/personal-web-page' && inputs.service != 'k3s/flux/private-home-page' && inputs.service != 'k3s/flux/mite-assistant-mcp' && inputs.service != 'k3s/flux/crowdsec-web-ui' && inputs.service != 'k3s/flux/traefik' && inputs.service != 'k3s/flux/headlamp' && inputs.service != 'k3s/flux/capacity-planner' && inputs.service != 'k3s/flux/shopify-gpt-assistant' && inputs.service != 'k3s/flux/bunker-game-app' && inputs.service != 'cloudflare-email'
        working-directory: terraform
        run: |
          terraform apply -auto-approve $TF_REFRESH_FLAG \
            -var proxmox_endpoint="${{ secrets.PROXMOX_ENDPOINT }}" \
            -var proxmox_username="${{ secrets.PROXMOX_USERNAME }}" \
            -var proxmox_password="${{ secrets.PROXMOX_PASSWORD }}" \
            -var ssh_public_key="${{ secrets.SSH_PUBLIC_KEY }}" \
            -var cloudflare_api_token="${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -var haproxy_public_ip="${{ secrets.HAPROXY_PUBLIC_IP }}"

      - name: Terraform Apply (personal-web-page DNS)
        if: inputs.service == 'k3s/flux/personal-web-page'
        working-directory: terraform
        run: |
          terraform apply -auto-approve $TF_REFRESH_FLAG \
            -target=cloudflare_record.personal_web_page_apex \
            -target=cloudflare_record.personal_web_page_www \
            -var proxmox_endpoint="${{ secrets.PROXMOX_ENDPOINT }}" \
            -var proxmox_username="${{ secrets.PROXMOX_USERNAME }}" \
            -var proxmox_password="${{ secrets.PROXMOX_PASSWORD }}" \
            -var ssh_public_key="${{ secrets.SSH_PUBLIC_KEY }}" \
            -var cloudflare_api_token="${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -var haproxy_public_ip="${{ secrets.HAPROXY_PUBLIC_IP }}"

      - name: Terraform Apply (private-home-page DNS)
        if: inputs.service == 'k3s/flux/private-home-page'
        working-directory: terraform
        run: |
          terraform apply -auto-approve $TF_REFRESH_FLAG \
            -target=cloudflare_record.private_home_page \
            -var proxmox_endpoint="${{ secrets.PROXMOX_ENDPOINT }}" \
            -var proxmox_username="${{ secrets.PROXMOX_USERNAME }}" \
            -var proxmox_password="${{ secrets.PROXMOX_PASSWORD }}" \
            -var ssh_public_key="${{ secrets.SSH_PUBLIC_KEY }}" \
            -var cloudflare_api_token="${{ secrets.CLOUDFLARE_API_TOKEN }}"

      - name: Terraform Apply (mite-assistant-mcp DNS)
        if: inputs.service == 'k3s/flux/mite-assistant-mcp'
        working-directory: terraform
        run: |
          terraform apply -auto-approve $TF_REFRESH_FLAG \
            -target=cloudflare_record.mite_assistant \
            -var proxmox_endpoint="${{ secrets.PROXMOX_ENDPOINT }}" \
            -var proxmox_username="${{ secrets.PROXMOX_USERNAME }}" \
            -var proxmox_password="${{ secrets.PROXMOX_PASSWORD }}" \
            -var ssh_public_key="${{ secrets.SSH_PUBLIC_KEY }}" \
            -var cloudflare_api_token="${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -var haproxy_public_ip="${{ secrets.HAPROXY_PUBLIC_IP }}"

      - name: Terraform Apply (crowdsec-web-ui DNS)
        if: inputs.service == 'k3s/flux/crowdsec-web-ui'
        working-directory: terraform
        run: |
          terraform apply -auto-approve $TF_REFRESH_FLAG \
            -target=cloudflare_record.crowdsec_web_ui \
            -var proxmox_endpoint="${{ secrets.PROXMOX_ENDPOINT }}" \
            -var proxmox_username="${{ secrets.PROXMOX_USERNAME }}" \
            -var proxmox_password="${{ secrets.PROXMOX_PASSWORD }}" \
            -var ssh_public_key="${{ secrets.SSH_PUBLIC_KEY }}" \
            -var cloudflare_api_token="${{ secrets.CLOUDFLARE_API_TOKEN }}"

      - name: Terraform Apply (traefik DNS)
        if: inputs.service == 'k3s/flux/traefik'
        working-directory: terraform
        run: |
          terraform apply -auto-approve $TF_REFRESH_FLAG \
            -target=cloudflare_record.traefik \
            -var proxmox_endpoint="${{ secrets.PROXMOX_ENDPOINT }}" \
            -var proxmox_username="${{ secrets.PROXMOX_USERNAME }}" \
            -var proxmox_password="${{ secrets.PROXMOX_PASSWORD }}" \
            -var ssh_public_key="${{ secrets.SSH_PUBLIC_KEY }}" \
            -var cloudflare_api_token="${{ secrets.CLOUDFLARE_API_TOKEN }}"

      - name: Terraform Apply (headlamp DNS)
        if: inputs.service == 'k3s/flux/headlamp'
        working-directory: terraform
        run: |
          terraform apply -auto-approve $TF_REFRESH_FLAG \
            -target=cloudflare_record.headlamp \
            -var proxmox_endpoint="${{ secrets.PROXMOX_ENDPOINT }}" \
            -var proxmox_username="${{ secrets.PROXMOX_USERNAME }}" \
            -var proxmox_password="${{ secrets.PROXMOX_PASSWORD }}" \
            -var ssh_public_key="${{ secrets.SSH_PUBLIC_KEY }}" \
            -var cloudflare_api_token="${{ secrets.CLOUDFLARE_API_TOKEN }}"

      - name: Terraform Apply (capacity-planner DNS)
        if: inputs.service == 'k3s/flux/capacity-planner'
        working-directory: terraform
        run: |
          terraform apply -auto-approve $TF_REFRESH_FLAG \
            -target=cloudflare_record.capacity_planner \
            -var proxmox_endpoint="${{ secrets.PROXMOX_ENDPOINT }}" \
            -var proxmox_username="${{ secrets.PROXMOX_USERNAME }}" \
            -var proxmox_password="${{ secrets.PROXMOX_PASSWORD }}" \
            -var ssh_public_key="${{ secrets.SSH_PUBLIC_KEY }}" \
            -var cloudflare_api_token="${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -var haproxy_public_ip="${{ secrets.HAPROXY_PUBLIC_IP }}"

      - name: Terraform Apply (bunker-game-app DNS)
        if: inputs.service == 'k3s/flux/bunker-game-app'
        working-directory: terraform
        run: |
          terraform apply -auto-approve $TF_REFRESH_FLAG \
            -target=cloudflare_record.bunker_game_app \
            -var proxmox_endpoint="${{ secrets.PROXMOX_ENDPOINT }}" \
            -var proxmox_username="${{ secrets.PROXMOX_USERNAME }}" \
            -var proxmox_password="${{ secrets.PROXMOX_PASSWORD }}" \
            -var ssh_public_key="${{ secrets.SSH_PUBLIC_KEY }}" \
            -var cloudflare_api_token="${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -var haproxy_public_ip="${{ secrets.HAPROXY_PUBLIC_IP }}"

      - name: Terraform Apply (shopify-gpt-assistant DNS)
        if: inputs.service == 'k3s/flux/shopify-gpt-assistant'
        working-directory: terraform
        run: |
          terraform apply -auto-approve $TF_REFRESH_FLAG \
            -target=cloudflare_record.shopify_gpt_assistant \
            -var proxmox_endpoint="${{ secrets.PROXMOX_ENDPOINT }}" \
            -var proxmox_username="${{ secrets.PROXMOX_USERNAME }}" \
            -var proxmox_password="${{ secrets.PROXMOX_PASSWORD }}" \
            -var ssh_public_key="${{ secrets.SSH_PUBLIC_KEY }}" \
            -var cloudflare_api_token="${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -var haproxy_public_ip="${{ secrets.HAPROXY_PUBLIC_IP }}"

      - name: Terraform Apply (cloudflare-email)
        if: inputs.service == 'cloudflare-email'
        working-directory: terraform
        run: |
          terraform apply -auto-approve $TF_REFRESH_FLAG \
            -target=module.cloudflare_email \
            -var proxmox_endpoint="${{ secrets.PROXMOX_ENDPOINT }}" \
            -var proxmox_username="${{ secrets.PROXMOX_USERNAME }}" \
            -var proxmox_password="${{ secrets.PROXMOX_PASSWORD }}" \
            -var ssh_public_key="${{ secrets.SSH_PUBLIC_KEY }}" \
            -var cloudflare_api_token="${{ secrets.CLOUDFLARE_API_TOKEN }}"

      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r ansible/requirements.yml

      - name: Install Python deps
        run: sudo apt-get install -y python3-passlib

      - name: Run Ansible
        if: inputs.service != 'proxmox-dns' && inputs.service != 'k3s/flux/personal-web-page' && inputs.service != 'k3s/flux/private-home-page' && inputs.service != 'k3s/flux/mite-assistant-mcp' && inputs.service != 'k3s/flux/crowdsec-web-ui' && inputs.service != 'k3s/flux/traefik' && inputs.service != 'k3s/flux/headlamp' && inputs.service != 'k3s/flux/capacity-planner' && inputs.service != 'k3s/flux/shopify-gpt-assistant' && inputs.service != 'k3s/flux/bunker-game-app' && inputs.service != 'cloudflare-email'
        working-directory: ansible
        run: |
          run_playbook() {
            local pb=$1
            ansible-playbook \
              -i inventories/homelab.yml \
              playbooks/$pb.yml \
              -e adguard_username="${{ secrets.ADGUARD_USERNAME }}" \
              -e adguard_password="${{ secrets.ADGUARD_PASSWORD }}" \
              -e letsencrypt_email="${{ secrets.LETSENCRYPT_EMAIL }}" \
              -e vault_username="${{ secrets.VAULT_USERNAME }}" \
              -e vault_password="${{ secrets.VAULT_PASSWORD }}" \
              -e postgresql_db="${{ secrets.POSTGRESQL_DB }}" \
              -e postgresql_user="${{ secrets.POSTGRESQL_USER }}" \
              -e postgresql_password="${{ secrets.POSTGRESQL_PASSWORD }}" \
              -e pgadmin_email="${{ secrets.PGADMIN_EMAIL }}" \
              -e pgadmin_password="${{ secrets.PGADMIN_PASSWORD }}" \
              -e redis_password="${{ secrets.REDIS_PASSWORD }}" \
              -e redis_commander_user="${{ secrets.REDIS_COMMANDER_USER }}" \
              -e redis_commander_password="${{ secrets.REDIS_COMMANDER_PASSWORD }}" \
              -e rabbitmq_user="${{ secrets.RABBITMQ_USER }}" \
              -e rabbitmq_password="${{ secrets.RABBITMQ_PASSWORD }}" \
              -e portainer_admin_username="${{ secrets.PORTAINER_ADMIN_USERNAME }}" \
              -e portainer_admin_password="${{ secrets.PORTAINER_ADMIN_PASSWORD }}" \
              -e haproxy_stats_user="${{ secrets.HAPROXY_STATS_USER }}" \
              -e haproxy_stats_password="${{ secrets.HAPROXY_STATS_PASSWORD }}" \
              -e flux_github_token="${{ secrets.FLUX_GITHUB_TOKEN }}" \
              -e cloudflare_api_token="${{ secrets.CLOUDFLARE_API_TOKEN }}"
          }

          case "${{ inputs.service }}" in
            all)      for pb in adguard vault postgres redis portainer haproxy nfs k3s; do run_playbook $pb; done ;;
            k3s/flux) run_playbook flux ;;
            *)        run_playbook ${{ inputs.service }} ;;
          esac
