name: Deploy Service

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Service to deploy"
        required: true
        type: choice
        options:
          - common/all
          - common/shared
          - common/adguard
          - common/vault
          - common/postgresql
          - common/redis
          - prod/all
          - prod/haproxy
          - prod/nfs
          - prod/k3s
          - prod/k3s/flux

jobs:
  deploy:
    name: Deploy / ${{ inputs.service }}
    runs-on: self-hosted
    environment: ${{ startsWith(inputs.service, 'prod') && 'prod' || 'common' }}
    permissions:
      contents: write

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_ENDPOINT_URL_S3: ${{ secrets.R2_ENDPOINT }}
      TF_VAR_ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve env and playbook
        id: ctx
        run: |
          SERVICE="${{ inputs.service }}"
          echo "env=${SERVICE%%/*}"      >> $GITHUB_OUTPUT
          echo "playbook=${SERVICE##*/}" >> $GITHUB_OUTPUT

      - name: Terraform Init
        if: steps.ctx.outputs.playbook != 'flux'
        working-directory: terraform/envs/${{ steps.ctx.outputs.env }}
        run: terraform init -backend-config="bucket=${{ secrets.R2_BUCKET_NAME }}"

      - name: Terraform Apply
        if: steps.ctx.outputs.playbook != 'flux'
        working-directory: terraform/envs/${{ steps.ctx.outputs.env }}
        run: |
          terraform apply -auto-approve \
            -var proxmox_endpoint="${{ secrets.PROXMOX_ENDPOINT }}" \
            -var proxmox_username="${{ secrets.PROXMOX_USERNAME }}" \
            -var proxmox_password="${{ secrets.PROXMOX_PASSWORD }}" \
            -var ssh_public_key="${{ secrets.SSH_PUBLIC_KEY }}" \
            -var cloudflare_api_token="${{ secrets.CLOUDFLARE_API_TOKEN }}"

      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Install Python deps
        run: sudo apt-get install -y python3-passlib

      - name: Run Ansible
        if: steps.ctx.outputs.playbook != 'shared'
        working-directory: ansible
        run: |
          run_playbook() {
            ansible-playbook \
              -i inventories/${{ steps.ctx.outputs.env }}.yml \
              playbooks/$1.yml \
              -e adguard_username="${{ secrets.ADGUARD_USERNAME }}" \
              -e adguard_password="${{ secrets.ADGUARD_PASSWORD }}" \
              -e adguard_cert_email="${{ secrets.LETSENCRYPT_EMAIL }}" \
              -e vault_username="${{ secrets.VAULT_USERNAME }}" \
              -e vault_password="${{ secrets.VAULT_PASSWORD }}" \
              -e postgresql_db="${{ secrets.POSTGRESQL_DB }}" \
              -e postgresql_user="${{ secrets.POSTGRESQL_USER }}" \
              -e postgresql_password="${{ secrets.POSTGRESQL_PASSWORD }}" \
              -e pgadmin_email="${{ secrets.PGADMIN_EMAIL }}" \
              -e pgadmin_password="${{ secrets.PGADMIN_PASSWORD }}" \
              -e redis_password="${{ secrets.REDIS_PASSWORD }}" \
              -e redis_commander_user="${{ secrets.REDIS_COMMANDER_USER }}" \
              -e redis_commander_password="${{ secrets.REDIS_COMMANDER_PASSWORD }}" \
              -e haproxy_stats_user="${{ secrets.HAPROXY_STATS_USER }}" \
              -e haproxy_stats_password="${{ secrets.HAPROXY_STATS_PASSWORD }}" \
              -e flux_github_token="${{ secrets.FLUX_GITHUB_TOKEN }}" \
              -e cloudflare_api_token="${{ secrets.CLOUDFLARE_API_TOKEN }}"
          }

          PLAYBOOK="${{ steps.ctx.outputs.playbook }}"
          ENV="${{ steps.ctx.outputs.env }}"

          if [[ "$PLAYBOOK" == "all" && "$ENV" == "common" ]]; then
            for pb in adguard vault postgresql pgadmin redis; do run_playbook $pb; done
          elif [[ "$PLAYBOOK" == "all" && "$ENV" == "prod" ]]; then
            for pb in haproxy nfs k3s; do run_playbook $pb; done
          else
            run_playbook $PLAYBOOK
          fi