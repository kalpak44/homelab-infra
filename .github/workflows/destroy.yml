name: Destroy Service

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Service to destroy"
        required: true
        type: choice
        options: [adguard, vault, postgresql, pgadmin, redis, microk8s, haproxy, nfs]

jobs:
  destroy:
    name: Destroy / ${{ inputs.service }}
    runs-on: self-hosted
    environment: ${{ contains(fromJson('["microk8s","haproxy","nfs"]'), inputs.service) && 'prod' || 'common' }}

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_ENDPOINT_URL_S3: ${{ secrets.R2_ENDPOINT }}
      TF_VAR_ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve env and targets
        id: ctx
        run: |
          case "${{ inputs.service }}" in
            adguard)    echo "env=common" >> $GITHUB_OUTPUT
                        echo "targets=-target=module.adguard" >> $GITHUB_OUTPUT ;;
            vault)      echo "env=common" >> $GITHUB_OUTPUT
                        echo "targets=-target=module.vault" >> $GITHUB_OUTPUT ;;
            postgresql) echo "env=common" >> $GITHUB_OUTPUT
                        echo "targets=-target=module.postgresql" >> $GITHUB_OUTPUT ;;
            pgadmin)    echo "env=common" >> $GITHUB_OUTPUT
                        echo "targets=-target=module.pgadmin" >> $GITHUB_OUTPUT ;;
            redis)      echo "env=common" >> $GITHUB_OUTPUT
                        echo "targets=-target=module.redis" >> $GITHUB_OUTPUT ;;
            microk8s)   echo "env=prod" >> $GITHUB_OUTPUT
                        echo "targets=-target=module.prod_k8s_1 -target=module.prod_k8s_2" >> $GITHUB_OUTPUT ;;
            haproxy)    echo "env=prod" >> $GITHUB_OUTPUT
                        echo "targets=-target=module.prod_lb" >> $GITHUB_OUTPUT ;;
            nfs)        echo "env=prod" >> $GITHUB_OUTPUT
                        echo "targets=-target=module.prod_nfs" >> $GITHUB_OUTPUT ;;
          esac

      - name: Terraform Init
        working-directory: terraform/envs/${{ steps.ctx.outputs.env }}
        run: terraform init -backend-config="bucket=${{ secrets.R2_BUCKET_NAME }}"

      - name: Terraform Destroy
        working-directory: terraform/envs/${{ steps.ctx.outputs.env }}
        run: |
          terraform destroy -auto-approve \
            ${{ steps.ctx.outputs.targets }} \
            -var proxmox_endpoint="${{ secrets.PROXMOX_ENDPOINT }}" \
            -var proxmox_username="${{ secrets.PROXMOX_USERNAME }}" \
            -var proxmox_password="${{ secrets.PROXMOX_PASSWORD }}" \
            -var ssh_public_key="${{ secrets.SSH_PUBLIC_KEY }}"