name: Destroy Service

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Service to destroy"
        required: true
        type: choice
        options:
          - all
          - proxmox-dns
          - adguard
          - vault
          - postgres
          - redis
          - haproxy
          - nfs
          - k3s

jobs:
  destroy:
    name: Destroy / ${{ inputs.service }}
    runs-on: self-hosted
    environment: ${{ contains(fromJSON('["haproxy","nfs","k3s","all"]'), inputs.service) && 'prod' || 'common' }}

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_ENDPOINT_URL_S3: ${{ secrets.R2_ENDPOINT }}
      TF_VAR_ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve targets
        id: ctx
        run: |
          case "${{ inputs.service }}" in
            proxmox-dns) echo "targets=-target=cloudflare_record.proxmox" >> $GITHUB_OUTPUT ;;
            adguard)     echo "targets=-target=module.adguard    -target=cloudflare_record.adguard"    >> $GITHUB_OUTPUT ;;
            vault)       echo "targets=-target=module.vault      -target=cloudflare_record.vault"      >> $GITHUB_OUTPUT ;;
            postgres)    echo "targets=-target=module.postgres -target=cloudflare_record.postgres -target=cloudflare_record.pgadmin" >> $GITHUB_OUTPUT ;;
            redis)       echo "targets=-target=module.redis      -target=cloudflare_record.redis"      >> $GITHUB_OUTPUT ;;
            haproxy)     echo "targets=-target=module.prod_lb    -target=cloudflare_record.haproxy"    >> $GITHUB_OUTPUT ;;
            nfs)         echo "targets=-target=module.prod_nfs   -target=cloudflare_record.nfs"        >> $GITHUB_OUTPUT ;;
            k3s)         echo "targets=-target=module.prod_k3s_1 -target=module.prod_k3s_2"           >> $GITHUB_OUTPUT ;;
            all)         echo "targets=" >> $GITHUB_OUTPUT ;;
          esac

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -backend-config="bucket=${{ secrets.R2_BUCKET_NAME }}"

      - name: Terraform Destroy
        working-directory: terraform
        run: |
          terraform destroy -auto-approve \
            ${{ steps.ctx.outputs.targets }} \
            -var proxmox_endpoint="${{ secrets.PROXMOX_ENDPOINT }}" \
            -var proxmox_username="${{ secrets.PROXMOX_USERNAME }}" \
            -var proxmox_password="${{ secrets.PROXMOX_PASSWORD }}" \
            -var ssh_public_key="${{ secrets.SSH_PUBLIC_KEY }}" \
            -var cloudflare_api_token="${{ secrets.CLOUDFLARE_API_TOKEN }}"