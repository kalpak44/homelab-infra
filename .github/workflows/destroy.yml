name: Destroy Service

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Service to destroy"
        required: true
        type: choice
        options:
          - all
          - proxmox-dns
          - adguard
          - vault
          - postgres
          - redis
          - rabbitmq
          - portainer
          - haproxy
          - nfs
          - k3s
          - dpi
          - cloudflare-email

jobs:
  destroy:
    name: Destroy / ${{ inputs.service }}
    runs-on: self-hosted
    permissions:
      contents: read
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_ENDPOINT_URL_S3: ${{ secrets.R2_ENDPOINT }}
      TF_VAR_ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Verify actor is repository owner
        run: |
          [ "${{ github.actor }}" = "${{ github.repository_owner }}" ] || \
            { echo "Unauthorized actor: ${{ github.actor }}"; exit 1; }

      - name: Resolve targets
        id: ctx
        run: |
          case "${{ inputs.service }}" in
            proxmox-dns) echo "targets=-target=cloudflare_record.proxmox" >> $GITHUB_OUTPUT ;;
            adguard)     echo "targets=-target=module.adguard"  >> $GITHUB_OUTPUT ;;
            vault)       echo "targets=-target=module.vault"    >> $GITHUB_OUTPUT ;;
            postgres)    echo "targets=-target=module.postgres" >> $GITHUB_OUTPUT ;;
            redis)       echo "targets=-target=module.redis"       >> $GITHUB_OUTPUT ;;
            rabbitmq)    echo "targets=-target=module.rabbitmq"    >> $GITHUB_OUTPUT ;;
            portainer)   echo "targets=-target=module.portainer" >> $GITHUB_OUTPUT ;;
            haproxy)     echo "targets=-target=module.haproxy"   >> $GITHUB_OUTPUT ;;
            nfs)         echo "targets=-target=module.nfs"      >> $GITHUB_OUTPUT ;;
            k3s)              echo "targets=-target=module.k3s"              >> $GITHUB_OUTPUT ;;
            dpi)              echo "targets=-target=module.dpi"              >> $GITHUB_OUTPUT ;;
            cloudflare-email) echo "targets=-target=module.cloudflare_email" >> $GITHUB_OUTPUT ;;
            all)              echo "targets=" >> $GITHUB_OUTPUT ;;
          esac

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -backend-config="bucket=${{ secrets.R2_BUCKET_NAME }}"

      - name: Terraform Destroy
        working-directory: terraform
        run: |
          terraform destroy -auto-approve \
            ${{ steps.ctx.outputs.targets }} \
            -var proxmox_endpoint="${{ secrets.PROXMOX_ENDPOINT }}" \
            -var proxmox_username="${{ secrets.PROXMOX_USERNAME }}" \
            -var proxmox_password="${{ secrets.PROXMOX_PASSWORD }}" \
            -var ssh_public_key="${{ secrets.SSH_PUBLIC_KEY }}" \
            -var cloudflare_api_token="${{ secrets.CLOUDFLARE_API_TOKEN }}"