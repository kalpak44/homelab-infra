name: Destroy Service

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Service to destroy"
        required: true
        type: choice
        options:
          - common/adguard
          - common/vault
          - common/postgresql
          - common/redis
          - prod/haproxy
          - prod/nfs
          - prod/k3s

jobs:
  destroy:
    name: Destroy / ${{ inputs.service }}
    runs-on: self-hosted
    environment: ${{ startsWith(inputs.service, 'prod') && 'prod' || 'common' }}

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_ENDPOINT_URL_S3: ${{ secrets.R2_ENDPOINT }}
      TF_VAR_ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve env and targets
        id: ctx
        run: |
          SERVICE="${{ inputs.service }}"
          echo "env=${SERVICE%%/*}" >> $GITHUB_OUTPUT
          case "$SERVICE" in
            common/adguard)    echo "targets=-target=module.adguard    -target=cloudflare_record.adguard"    >> $GITHUB_OUTPUT ;;
            common/vault)      echo "targets=-target=module.vault      -target=cloudflare_record.vault"      >> $GITHUB_OUTPUT ;;
            common/postgresql) echo "targets=-target=module.postgresql -target=cloudflare_record.postgresql -target=cloudflare_record.pgadmin" >> $GITHUB_OUTPUT ;;
            common/redis)      echo "targets=-target=module.redis      -target=cloudflare_record.redis"      >> $GITHUB_OUTPUT ;;
            prod/k3s)     echo "targets=-target=module.prod_k3s_1 -target=module.prod_k3s_2" >> $GITHUB_OUTPUT ;;
            prod/haproxy)      echo "targets=-target=module.prod_lb"    >> $GITHUB_OUTPUT ;;
            prod/nfs)          echo "targets=-target=module.prod_nfs"   >> $GITHUB_OUTPUT ;;
          esac

      - name: Terraform Init
        working-directory: terraform/envs/${{ steps.ctx.outputs.env }}
        run: terraform init -backend-config="bucket=${{ secrets.R2_BUCKET_NAME }}"

      - name: Terraform Destroy
        working-directory: terraform/envs/${{ steps.ctx.outputs.env }}
        run: |
          terraform destroy -auto-approve \
            ${{ steps.ctx.outputs.targets }} \
            -var proxmox_endpoint="${{ secrets.PROXMOX_ENDPOINT }}" \
            -var proxmox_username="${{ secrets.PROXMOX_USERNAME }}" \
            -var proxmox_password="${{ secrets.PROXMOX_PASSWORD }}" \
            -var ssh_public_key="${{ secrets.SSH_PUBLIC_KEY }}" \
            -var cloudflare_api_token="${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -var cloudflare_zone_id="${{ secrets.CLOUDFLARE_ZONE_ID }}"