name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
  workflow_dispatch:
    inputs:
      env:
        description: "Environment to apply"
        required: true
        default: common
        type: choice
        options: [common, dev, prod]

jobs:
  apply:
    name: Apply / ${{ matrix.env }}
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        env: ${{ github.event_name == 'workflow_dispatch' && fromJson(format('["{0}"]', inputs.env)) || fromJson('["common","dev"]') }}
    environment: ${{ matrix.env }}
    defaults:
      run:
        working-directory: terraform/envs/${{ matrix.env }}

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_ENDPOINT_URL_S3: ${{ secrets.R2_ENDPOINT }}

    steps:
      - uses: actions/checkout@v4

      - name: Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.R2_BUCKET_NAME }}"

      - name: Apply
        run: |
          terraform apply -auto-approve \
            -var proxmox_endpoint="${{ secrets.PROXMOX_ENDPOINT }}" \
            -var proxmox_username="${{ secrets.PROXMOX_USERNAME }}" \
            -var proxmox_password="${{ secrets.PROXMOX_PASSWORD }}" \
            -var ssh_public_key="${{ secrets.SSH_PUBLIC_KEY }}"