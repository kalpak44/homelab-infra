---
# Phase 2 - download the Ubuntu 24.04 LXC template + cloud image, then create
# the Proxmox VM 9000 template used as the clone source for every VM service.
# Idempotent: each step is a no-op if the artifact already exists.

- name: Bootstrap - Proxmox base artifacts
  hosts: all
  gather_facts: false
  vars:
    lxc_template: ubuntu-24.04-standard_24.04-2_amd64.tar.zst
    cloud_image_url: https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img
    cloud_image_dest: /var/lib/vz/template/iso/noble-server-cloudimg-amd64.img
    template_vm_id: 9000
    template_vm_name: ubuntu-2404-template
    template_storage: local-lvm
  tasks:
    - name: Refresh pveam catalog
      ansible.builtin.command: pveam update
      changed_when: false

    - name: Download Ubuntu 24.04 LXC template
      ansible.builtin.command:
        cmd: "pveam download local {{ lxc_template }}"
      args:
        creates: "/var/lib/vz/template/cache/{{ lxc_template }}"

    - name: Check if SSH password-auth drop-in already patched into LXC template
      ansible.builtin.shell: |
        tar -I zstd -tf /var/lib/vz/template/cache/{{ lxc_template }} \
          | grep -qF "etc/ssh/sshd_config.d/99-password-login.conf"
      register: lxc_template_patched
      changed_when: false
      failed_when: false

    - name: Patch LXC template – enable SSH password auth
      when: lxc_template_patched.rc != 0
      block:
        - name: Create temp dir for template extraction
          ansible.builtin.tempfile:
            state: directory
            suffix: lxc-patch
          register: lxc_patch_dir

        - name: Extract LXC template
          ansible.builtin.command:
            cmd: "tar -I zstd -xf /var/lib/vz/template/cache/{{ lxc_template }} -C {{ lxc_patch_dir.path }}"

        - name: Ensure sshd_config.d exists in extracted rootfs
          ansible.builtin.file:
            path: "{{ lxc_patch_dir.path }}/etc/ssh/sshd_config.d"
            state: directory
            mode: "0755"

        - name: Write SSH password-auth drop-in
          ansible.builtin.copy:
            dest: "{{ lxc_patch_dir.path }}/etc/ssh/sshd_config.d/99-password-login.conf"
            content: |
              PermitRootLogin yes
              PasswordAuthentication yes
              UsePAM yes
            mode: "0644"

        - name: Repack LXC template
          ansible.builtin.command:
            cmd: "tar -I zstd -cf /var/lib/vz/template/cache/{{ lxc_template }} --numeric-owner -C {{ lxc_patch_dir.path }} ."

      always:
        - name: Remove temp extraction dir
          ansible.builtin.file:
            path: "{{ lxc_patch_dir.path }}"
            state: absent
          when: lxc_patch_dir.path is defined

    - name: Create VM vendor-data snippet for SSH password auth
      ansible.builtin.copy:
        dest: /var/lib/vz/snippets/vm-ssh-password.yaml
        content: |
          #cloud-config
          write_files:
            - path: /etc/ssh/sshd_config.d/00-password-login.conf
              content: |
                PermitRootLogin yes
                PasswordAuthentication yes
                UsePAM yes
              permissions: '0644'
          runcmd:
            - systemctl restart ssh
        mode: "0644"

    - name: Download Ubuntu cloud image
      ansible.builtin.get_url:
        url: "{{ cloud_image_url }}"
        dest: "{{ cloud_image_dest }}"
        mode: "0644"
        force: false

    - name: Check if template VM {{ template_vm_id }} already exists
      ansible.builtin.command: "qm status {{ template_vm_id }}"
      register: template_vm_status
      changed_when: false
      failed_when: false

    - name: Create template VM {{ template_vm_id }}
      when: template_vm_status.rc != 0
      block:
        - name: qm create
          ansible.builtin.command:
            cmd: >-
              qm create {{ template_vm_id }}
              --name {{ template_vm_name }}
              --memory 2048 --cores 2
              --net0 virtio,bridge=vmbr0
              --ostype l26

        - name: qm importdisk (from cloud image)
          ansible.builtin.command:
            cmd: "qm importdisk {{ template_vm_id }} {{ cloud_image_dest }} {{ template_storage }}"

        - name: qm set (disk + cloudinit + boot + serial console)
          ansible.builtin.command:
            cmd: >-
              qm set {{ template_vm_id }}
              --scsihw virtio-scsi-pci
              --scsi0 {{ template_storage }}:vm-{{ template_vm_id }}-disk-0
              --ide2 {{ template_storage }}:cloudinit
              --boot order=scsi0
              --serial0 socket --vga serial0

        - name: Convert to template
          ansible.builtin.command:
            cmd: "qm template {{ template_vm_id }}"

    - name: Check if VM {{ template_vm_id }} already has vendor cicustom set
      ansible.builtin.shell: "qm config {{ template_vm_id }} | grep -q cicustom"
      register: vm_cicustom_check
      changed_when: false
      failed_when: false

    - name: Apply vendor-data cicustom to VM {{ template_vm_id }} template
      ansible.builtin.command:
        cmd: "qm set {{ template_vm_id }} --cicustom 'vendor=local:snippets/vm-ssh-password.yaml'"
      when: vm_cicustom_check.rc != 0
      changed_when: true