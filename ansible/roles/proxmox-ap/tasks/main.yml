---
- name: Install hostapd and iw
  ansible.builtin.apt:
    name: [hostapd, iw]
    state: present
    update_cache: true

- name: Add vmbr2 bridge to /etc/network/interfaces
  ansible.builtin.blockinfile:
    path: /etc/network/interfaces
    marker: "# {mark} ANSIBLE MANAGED BLOCK - vmbr2"
    block: |
      auto vmbr2
      iface vmbr2 inet manual
          bridge-ports none
          bridge-stp off
          bridge-fd 0
          post-up echo 1 > /proc/sys/net/ipv4/conf/vmbr2/proxy_arp

- name: Bring up vmbr2
  ansible.builtin.command: ifup vmbr2
  register: ifup_vmbr2
  changed_when: ifup_vmbr2.rc == 0
  failed_when: ifup_vmbr2.rc != 0 and 'already' not in ifup_vmbr2.stderr

- name: Enable IP forwarding
  ansible.builtin.copy:
    dest: /etc/sysctl.d/99-ip-forward.conf
    content: "net.ipv4.ip_forward = 1\n"
    mode: "0644"

- name: Apply IP forwarding now
  ansible.builtin.command: sysctl -w net.ipv4.ip_forward=1
  changed_when: false

- name: Deploy wlap0 systemd service
  ansible.builtin.template:
    src: wlap0.service.j2
    dest: /etc/systemd/system/wlap0.service
    mode: "0644"
  notify: Reload systemd

- name: Enable and start wlap0 service
  ansible.builtin.systemd:
    name: wlap0
    enabled: true
    state: started
    daemon_reload: true

- name: Deploy hostapd config
  ansible.builtin.template:
    src: hostapd.conf.j2
    dest: /etc/hostapd/hostapd.conf
    mode: "0600"
  notify: Restart hostapd

- name: Point hostapd daemon to config
  ansible.builtin.lineinfile:
    path: /etc/default/hostapd
    regexp: '^#?DAEMON_CONF='
    line: 'DAEMON_CONF="/etc/hostapd/hostapd.conf"'
  notify: Restart hostapd

- name: Unmask hostapd service
  ansible.builtin.systemd:
    name: hostapd
    masked: false

- name: Enable and start hostapd
  ansible.builtin.systemd:
    name: hostapd
    enabled: true
    state: started