---
- name: Install dependencies
  ansible.builtin.apt:
    name: [gpg, curl]
    state: present
    update_cache: true

- name: Add HashiCorp GPG key
  ansible.builtin.shell:
    cmd: >
      curl -fsSL https://apt.releases.hashicorp.com/gpg |
      gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
    creates: /usr/share/keyrings/hashicorp-archive-keyring.gpg

- name: Add HashiCorp apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg]
      https://apt.releases.hashicorp.com {{ ansible_distribution_release }} main
    filename: hashicorp
    state: present

- name: Check installed Vault version
  ansible.builtin.command:
    cmd: dpkg-query -W -f='${Version}' vault
  register: vault_installed_ver
  changed_when: false
  failed_when: false

- name: Install Vault
  ansible.builtin.apt:
    name: "vault={{ vault_version }}-1"
    state: present
    update_cache: true
    allow_downgrade: true
  when: vault_installed_ver.stdout != vault_version + "-1"
  notify: Restart Vault

- name: Create data directory
  ansible.builtin.file:
    path: "{{ vault_data_dir }}"
    state: directory
    owner: vault
    group: vault
    mode: "0750"

- name: Install certbot and Cloudflare DNS plugin
  ansible.builtin.apt:
    name: [certbot, python3-certbot-dns-cloudflare]
    state: present
  when: vault_tls_enabled

- name: Deploy Cloudflare credentials for certbot
  ansible.builtin.copy:
    dest: /etc/letsencrypt/cloudflare.ini
    content: "dns_cloudflare_api_token = {{ cloudflare_api_token }}\n"
    owner: root
    group: root
    mode: "0600"
  when: vault_tls_enabled
  no_log: true

- name: Create TLS directory
  ansible.builtin.file:
    path: /etc/vault.d/tls
    state: directory
    owner: vault
    group: vault
    mode: "0750"
  when: vault_tls_enabled

- name: Issue Let's Encrypt certificate
  ansible.builtin.command:
    cmd: >
      certbot certonly
      --dns-cloudflare
      --dns-cloudflare-credentials /etc/letsencrypt/cloudflare.ini
      --dns-cloudflare-propagation-seconds 30
      --non-interactive
      --agree-tos
      --email {{ letsencrypt_email }}
      -d {{ vault_tls_domain }}
    creates: "/etc/letsencrypt/live/{{ vault_tls_domain }}/fullchain.pem"
  when: vault_tls_enabled and letsencrypt_email != ""

- name: Copy TLS certificate for Vault
  ansible.builtin.copy:
    src: "/etc/letsencrypt/live/{{ vault_tls_domain }}/fullchain.pem"
    dest: "{{ vault_cert_path }}"
    remote_src: true
    owner: vault
    group: vault
    mode: "0640"
  when: vault_tls_enabled
  notify: Restart Vault

- name: Copy TLS private key for Vault
  ansible.builtin.copy:
    src: "/etc/letsencrypt/live/{{ vault_tls_domain }}/privkey.pem"
    dest: "{{ vault_key_path }}"
    remote_src: true
    owner: vault
    group: vault
    mode: "0640"
  when: vault_tls_enabled
  notify: Restart Vault

- name: Deploy certbot renewal hook for Vault
  ansible.builtin.copy:
    dest: /etc/letsencrypt/renewal-hooks/deploy/restart-vault.sh
    content: |
      #!/bin/bash
      cp /etc/letsencrypt/live/{{ vault_tls_domain }}/fullchain.pem {{ vault_cert_path }}
      cp /etc/letsencrypt/live/{{ vault_tls_domain }}/privkey.pem {{ vault_key_path }}
      chown vault:vault {{ vault_cert_path }} {{ vault_key_path }}
      chmod 640 {{ vault_cert_path }} {{ vault_key_path }}
      systemctl restart vault
    mode: "0755"
  when: vault_tls_enabled

- name: Deploy Vault configuration
  ansible.builtin.template:
    src: vault.hcl.j2
    dest: "{{ vault_config_dir }}/vault.hcl"
    owner: vault
    group: vault
    mode: "0640"
  notify: Restart Vault

- name: Flush handlers to restart Vault immediately if upgraded
  ansible.builtin.meta: flush_handlers

- name: Ensure Vault service is running
  ansible.builtin.systemd:
    name: vault
    state: started
    enabled: true
    daemon_reload: true

- name: Wait for Vault API to be ready
  ansible.builtin.command:
    cmd: vault status -format=json
  environment:
    VAULT_ADDR: "{{ vault_addr }}"
    VAULT_SKIP_VERIFY: "{{ vault_tls_enabled | string | lower }}"
  register: vault_status_wait
  until: vault_status_wait.rc in [0, 2]
  retries: 12
  delay: 5
  changed_when: false
  failed_when: false

- name: Check Vault initialization status
  ansible.builtin.command:
    cmd: vault status -format=json
  environment:
    VAULT_ADDR: "{{ vault_addr }}"
    VAULT_SKIP_VERIFY: "{{ vault_tls_enabled | string | lower }}"
  register: vault_status
  changed_when: false
  failed_when: false

- name: Set vault status facts
  ansible.builtin.set_fact:
    vault_initialized: "{{ (vault_status.stdout | from_json).initialized }}"
    vault_sealed: "{{ (vault_status.stdout | from_json).sealed }}"

- name: Initialize Vault
  ansible.builtin.shell:
    cmd: >
      vault operator init -key-shares=1 -key-threshold=1 -format=json
      > /root/vault-init.json
    creates: /root/vault-init.json
  environment:
    VAULT_ADDR: "{{ vault_addr }}"
    VAULT_SKIP_VERIFY: "{{ vault_tls_enabled | string | lower }}"
  when: not vault_initialized
  no_log: true

- name: Secure init file
  ansible.builtin.file:
    path: /root/vault-init.json
    mode: "0600"

- name: Read init file
  ansible.builtin.slurp:
    src: /root/vault-init.json
  register: vault_init_file
  no_log: true

- name: Set unseal key and root token facts
  ansible.builtin.set_fact:
    vault_unseal_key: "{{ (vault_init_file.content | b64decode | from_json).unseal_keys_b64[0] }}"
    vault_root_token: "{{ (vault_init_file.content | b64decode | from_json).root_token }}"
  no_log: true

- name: Re-check sealed status
  ansible.builtin.command:
    cmd: vault status -format=json
  environment:
    VAULT_ADDR: "{{ vault_addr }}"
    VAULT_SKIP_VERIFY: "{{ vault_tls_enabled | string | lower }}"
  register: vault_status_current
  changed_when: false
  failed_when: false

- name: Unseal Vault if sealed
  ansible.builtin.command:
    cmd: vault operator unseal {{ vault_unseal_key }}
  environment:
    VAULT_ADDR: "{{ vault_addr }}"
    VAULT_SKIP_VERIFY: "{{ vault_tls_enabled | string | lower }}"
  when: (vault_status_current.stdout | from_json).sealed
  no_log: true
  changed_when: true

- name: Enable userpass auth method
  ansible.builtin.command:
    cmd: vault auth enable userpass
  environment:
    VAULT_ADDR: "{{ vault_addr }}"
    VAULT_SKIP_VERIFY: "{{ vault_tls_enabled | string | lower }}"
    VAULT_TOKEN: "{{ vault_root_token }}"
  register: auth_enable
  failed_when:
    - auth_enable.rc != 0
    - "'already in use' not in auth_enable.stderr"
  changed_when: auth_enable.rc == 0
  when: vault_username != "" and vault_password != ""
  no_log: true

- name: Write admin policy
  ansible.builtin.shell:
    cmd: |
      vault policy write admin - <<'POLICY'
      path "*" {
        capabilities = ["create", "read", "update", "delete", "list", "sudo"]
      }
      path "sys/*" {
        capabilities = ["create", "read", "update", "delete", "list", "sudo"]
      }
      path "sys/internal/ui/*" {
        capabilities = ["read", "list"]
      }
      path "auth/*" {
        capabilities = ["create", "read", "update", "delete", "list", "sudo"]
      }
      POLICY
  environment:
    VAULT_ADDR: "{{ vault_addr }}"
    VAULT_SKIP_VERIFY: "{{ vault_tls_enabled | string | lower }}"
    VAULT_TOKEN: "{{ vault_root_token }}"
  changed_when: true
  when: vault_username != "" and vault_password != ""
  no_log: true

- name: Write user payload to temp file
  ansible.builtin.copy:
    content: "{{ {'password': vault_password | trim, 'policies': 'admin'} | to_json }}"
    dest: /tmp/.vault_user.json
    mode: "0600"
  when: vault_username != "" and vault_password != ""
  no_log: true

- name: Create admin user
  ansible.builtin.command:
    argv:
      - vault
      - write
      - "auth/userpass/users/{{ vault_username | trim }}"
      - "@/tmp/.vault_user.json"
  environment:
    VAULT_ADDR: "{{ vault_addr }}"
    VAULT_SKIP_VERIFY: "{{ vault_tls_enabled | string | lower }}"
    VAULT_TOKEN: "{{ vault_root_token }}"
  changed_when: true
  when: vault_username != "" and vault_password != ""
  no_log: true

- name: Remove user payload temp file
  ansible.builtin.file:
    path: /tmp/.vault_user.json
    state: absent
  when: vault_username != "" and vault_password != ""

- name: Enable KV v2 secrets engine
  ansible.builtin.command:
    cmd: vault secrets enable -path=secret kv-v2
  environment:
    VAULT_ADDR: "{{ vault_addr }}"
    VAULT_SKIP_VERIFY: "{{ vault_tls_enabled | string | lower }}"
    VAULT_TOKEN: "{{ vault_root_token }}"
  register: kv_enable
  failed_when:
    - kv_enable.rc != 0
    - "'already in use' not in kv_enable.stderr"
  changed_when: kv_enable.rc == 0

- name: Fetch k3s CA certificate from control plane
  ansible.builtin.slurp:
    src: /var/lib/rancher/k3s/server/tls/server-ca.crt
  delegate_to: k3s-1
  become: true
  register: k3s_ca_cert

- name: Create vault-auth service account in k3s
  ansible.builtin.command:
    cmd: kubectl apply -f -
    stdin: |
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: vault-auth
        namespace: kube-system
  delegate_to: k3s-1
  become: true
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  changed_when: true

- name: Bind vault-auth to system:auth-delegator
  ansible.builtin.command:
    cmd: kubectl apply -f -
    stdin: |
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: vault-auth
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: system:auth-delegator
      subjects:
        - kind: ServiceAccount
          name: vault-auth
          namespace: kube-system
  delegate_to: k3s-1
  become: true
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  changed_when: true

- name: Create vault-auth long-lived token secret
  ansible.builtin.command:
    cmd: kubectl apply -f -
    stdin: |
      apiVersion: v1
      kind: Secret
      metadata:
        name: vault-auth-token
        namespace: kube-system
        annotations:
          kubernetes.io/service-account.name: vault-auth
      type: kubernetes.io/service-account-token
  delegate_to: k3s-1
  become: true
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  changed_when: true

- name: Wait for vault-auth token to be populated
  ansible.builtin.command:
    cmd: kubectl get secret vault-auth-token -n kube-system -o jsonpath='{.data.token}'
  delegate_to: k3s-1
  become: true
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: vault_auth_token_b64
  until: vault_auth_token_b64.stdout != ""
  retries: 12
  delay: 5
  changed_when: false
  no_log: true

- name: Set vault reviewer JWT fact
  ansible.builtin.set_fact:
    vault_reviewer_jwt: "{{ vault_auth_token_b64.stdout | b64decode }}"
  no_log: true

- name: Enable Kubernetes auth method in Vault
  ansible.builtin.command:
    cmd: vault auth enable kubernetes
  environment:
    VAULT_ADDR: "{{ vault_addr }}"
    VAULT_SKIP_VERIFY: "{{ vault_tls_enabled | string | lower }}"
    VAULT_TOKEN: "{{ vault_root_token }}"
  register: k8s_auth_enable
  failed_when:
    - k8s_auth_enable.rc != 0
    - "'already in use' not in k8s_auth_enable.stderr"
  changed_when: k8s_auth_enable.rc == 0

- name: Write k3s CA cert to temp file
  ansible.builtin.copy:
    content: "{{ k3s_ca_cert.content | b64decode }}"
    dest: /tmp/.k3s-ca.crt
    mode: "0600"

- name: Configure Kubernetes auth method
  ansible.builtin.command:
    cmd: >
      vault write auth/kubernetes/config
      kubernetes_host="https://{{ k3s_api_host }}:{{ k3s_api_port }}"
      kubernetes_ca_cert=@/tmp/.k3s-ca.crt
      token_reviewer_jwt="{{ vault_reviewer_jwt }}"
  environment:
    VAULT_ADDR: "{{ vault_addr }}"
    VAULT_SKIP_VERIFY: "{{ vault_tls_enabled | string | lower }}"
    VAULT_TOKEN: "{{ vault_root_token }}"
  changed_when: true
  no_log: true

- name: Remove k3s CA cert temp file
  ansible.builtin.file:
    path: /tmp/.k3s-ca.crt
    state: absent

- name: Write external-secrets read policy
  ansible.builtin.shell:
    cmd: |
      vault policy write external-secrets - <<'POLICY'
      path "secret/data/*" {
        capabilities = ["read"]
      }
      path "secret/metadata/*" {
        capabilities = ["read", "list"]
      }
      POLICY
  environment:
    VAULT_ADDR: "{{ vault_addr }}"
    VAULT_SKIP_VERIFY: "{{ vault_tls_enabled | string | lower }}"
    VAULT_TOKEN: "{{ vault_root_token }}"
  changed_when: true

- name: Create Kubernetes auth role for external-secrets
  ansible.builtin.command:
    cmd: >
      vault write auth/kubernetes/role/external-secrets
      bound_service_account_names=external-secrets
      bound_service_account_namespaces=external-secrets
      policies=external-secrets
      ttl=1h
  environment:
    VAULT_ADDR: "{{ vault_addr }}"
    VAULT_SKIP_VERIFY: "{{ vault_tls_enabled | string | lower }}"
    VAULT_TOKEN: "{{ vault_root_token }}"
  changed_when: true