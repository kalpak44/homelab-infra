---
# --- Repository -----------------------------------------------------------

- name: Install prerequisites
  ansible.builtin.apt:
    name: [curl, gnupg, python3-psycopg2]
    state: present
    update_cache: true

- name: Add PostgreSQL GPG key
  ansible.builtin.shell:
    cmd: >
      curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc |
      gpg --dearmor -o /usr/share/keyrings/postgresql.gpg
    creates: /usr/share/keyrings/postgresql.gpg

- name: Add PostgreSQL apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [signed-by=/usr/share/keyrings/postgresql.gpg]
      https://apt.postgresql.org/pub/repos/apt {{ ansible_distribution_release }}-pgdg main
    filename: pgdg
    state: present

# --- Pre-install cluster defaults -----------------------------------------
# Deploy createcluster.conf before the package installs so the cluster
# auto-created by apt already uses the correct encoding and locale.

- name: Install postgresql-common
  ansible.builtin.apt:
    name: postgresql-common
    state: present

- name: Deploy createcluster.conf
  ansible.builtin.template:
    src: createcluster.conf.j2
    dest: /etc/postgresql-common/createcluster.conf
    owner: root
    group: root
    mode: "0644"

# --- Install --------------------------------------------------------------

- name: Install PostgreSQL {{ postgresql_version }}
  ansible.builtin.apt:
    name: "postgresql-{{ postgresql_version }}"
    state: present
    update_cache: true

# --- Ensure cluster exists ------------------------------------------------
# On some minimal LXC images the cluster is not auto-created by apt.

- name: Check if cluster data directory exists
  ansible.builtin.stat:
    path: "/etc/postgresql/{{ postgresql_version }}/main/postgresql.conf"
  register: pg_cluster

- name: Create cluster if missing
  ansible.builtin.command:
    cmd: >
      pg_createcluster --locale C.UTF-8 --encoding UTF8
      {{ postgresql_version }} main
  when: not pg_cluster.stat.exists
  changed_when: true

# --- Start ---------------------------------------------------------------

- name: Start and enable PostgreSQL cluster
  ansible.builtin.systemd:
    name: "postgresql@{{ postgresql_version }}-main"
    state: started
    enabled: true
    daemon_reload: true

# --- Configure -----------------------------------------------------------

- name: Ensure conf.d directory exists
  ansible.builtin.file:
    path: "/etc/postgresql/{{ postgresql_version }}/main/conf.d"
    state: directory
    owner: postgres
    group: postgres
    mode: "0755"

- name: Deploy homelab overrides to conf.d
  ansible.builtin.template:
    src: conf.d/homelab.conf.j2
    dest: "/etc/postgresql/{{ postgresql_version }}/main/conf.d/homelab.conf"
    owner: postgres
    group: postgres
    mode: "0640"
  notify: Restart PostgreSQL

- name: Deploy pg_hba.conf
  ansible.builtin.template:
    src: pg_hba.conf.j2
    dest: "/etc/postgresql/{{ postgresql_version }}/main/pg_hba.conf"
    owner: postgres
    group: postgres
    mode: "0640"
  notify: Restart PostgreSQL

- name: Flush handlers to apply config
  ansible.builtin.meta: flush_handlers

- name: Wait for PostgreSQL socket
  ansible.builtin.wait_for:
    path: "/var/run/postgresql/.s.PGSQL.{{ postgresql_port }}"
    state: present
    timeout: 30

# --- Bootstrap user and database -----------------------------------------

- name: Write user creation SQL
  ansible.builtin.template:
    src: create_user.sql.j2
    dest: /tmp/pg_create_user.sql
    owner: postgres
    group: postgres
    mode: "0600"
  no_log: true
  when: postgresql_user != ""

- name: Create or update application user
  ansible.builtin.command:
    cmd: psql -v ON_ERROR_STOP=1 -f /tmp/pg_create_user.sql
  become_user: postgres
  changed_when: true
  no_log: true
  when: postgresql_user != ""

- name: Remove user creation SQL
  ansible.builtin.file:
    path: /tmp/pg_create_user.sql
    state: absent

- name: Check if application database exists
  ansible.builtin.command:
    cmd: >
      psql -tAc
      "SELECT 1 FROM pg_database WHERE datname = '{{ postgresql_db | replace("'", "''") }}'"
  become_user: postgres
  register: db_check
  changed_when: false
  when: postgresql_db != ""

- name: Create application database
  ansible.builtin.command:
    cmd: >
      createdb -O "{{ postgresql_user }}"
      -E UTF8 -T template0
      "{{ postgresql_db }}"
  become_user: postgres
  changed_when: true
  when:
    - postgresql_db != ""
    - postgresql_user != ""
    - db_check.stdout != "1"