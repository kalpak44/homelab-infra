---
- name: Install dependencies
  ansible.builtin.apt:
    name: [curl, gnupg]
    state: present
    update_cache: true

- name: Add PostgreSQL GPG key
  ansible.builtin.shell:
    cmd: >
      curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc |
      gpg --dearmor -o /usr/share/keyrings/postgresql.gpg
    creates: /usr/share/keyrings/postgresql.gpg

- name: Add PostgreSQL apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [signed-by=/usr/share/keyrings/postgresql.gpg]
      https://apt.postgresql.org/pub/repos/apt {{ ansible_distribution_release }}-pgdg main
    filename: pgdg
    state: present

- name: Install PostgreSQL
  ansible.builtin.apt:
    name: "postgresql-{{ postgresql_version }}"
    state: present
    update_cache: true

# apt auto-creates the cluster with the system locale (SQL_ASCII).
# We start it, check the encoding, and recreate with UTF-8 if needed.
# Safe on fresh LXCs — no data exists yet at this point.
- name: Ensure PostgreSQL is running
  ansible.builtin.systemd:
    name: postgresql
    state: started
    enabled: true

- name: Check cluster encoding
  ansible.builtin.command:
    cmd: psql -tAc "SELECT pg_encoding_to_char(encoding) FROM pg_database WHERE datname='postgres'"
  become: true
  become_user: postgres
  register: cluster_encoding
  changed_when: false

- name: Recreate cluster with UTF-8 encoding
  when: cluster_encoding.stdout | trim != 'UTF8'
  block:
    - name: Stop PostgreSQL
      ansible.builtin.systemd:
        name: postgresql
        state: stopped

    - name: Drop SQL_ASCII cluster created by apt
      ansible.builtin.command:
        cmd: "pg_dropcluster {{ postgresql_version }} main"

    - name: Create cluster with C.UTF-8 locale and UTF8 encoding
      ansible.builtin.command:
        cmd: "pg_createcluster --locale=C.UTF-8 {{ postgresql_version }} main -- --encoding=UTF8"

    - name: Start PostgreSQL
      ansible.builtin.systemd:
        name: postgresql
        state: started

- name: Configure listen addresses
  ansible.builtin.lineinfile:
    path: "/etc/postgresql/{{ postgresql_version }}/main/postgresql.conf"
    regexp: "^#?listen_addresses"
    line: "listen_addresses = '*'"
  notify: Restart PostgreSQL

- name: Set default client encoding to UTF-8
  ansible.builtin.lineinfile:
    path: "/etc/postgresql/{{ postgresql_version }}/main/postgresql.conf"
    regexp: "^#?client_encoding"
    line: "client_encoding = UTF8"
  notify: Restart PostgreSQL

- name: Deploy pg_hba.conf
  ansible.builtin.template:
    src: pg_hba.conf.j2
    dest: "/etc/postgresql/{{ postgresql_version }}/main/pg_hba.conf"
    owner: postgres
    group: postgres
    mode: "0640"
  notify: Restart PostgreSQL

- name: Flush handlers to apply config before creating objects
  ansible.builtin.meta: flush_handlers

- name: Create application user
  ansible.builtin.command:
    cmd: >
      psql -c "DO $$
      BEGIN
        IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = '{{ postgresql_user }}') THEN
          CREATE USER {{ postgresql_user }} WITH PASSWORD '{{ postgresql_password }}' SUPERUSER CREATEDB CREATEROLE;
        ELSE
          ALTER USER {{ postgresql_user }} WITH PASSWORD '{{ postgresql_password }}' SUPERUSER CREATEDB CREATEROLE;
        END IF;
      END $$;"
  become: true
  become_user: postgres
  changed_when: true
  when: postgresql_user != "" and postgresql_password != ""
  no_log: true

- name: Create application database
  ansible.builtin.command:
    cmd: >
      psql -c "SELECT 1 FROM pg_database WHERE datname = '{{ postgresql_db }}'"
  become: true
  become_user: postgres
  register: db_check
  changed_when: false
  when: postgresql_db != ""

- name: Create database if not exists
  ansible.builtin.command:
    cmd: "createdb -O {{ postgresql_user }} -E UTF8 -T template0 {{ postgresql_db }}"
  become: true
  become_user: postgres
  when:
    - postgresql_db != ""
    - postgresql_user != ""
    - db_check.stdout is not search("1 row")