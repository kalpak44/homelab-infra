---
- name: Install dependencies
  ansible.builtin.apt:
    name: [curl, gnupg, python3-psycopg2]
    state: present
    update_cache: true

- name: Add PostgreSQL GPG key
  ansible.builtin.shell:
    cmd: >
      curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc |
      gpg --dearmor -o /usr/share/keyrings/postgresql.gpg
    creates: /usr/share/keyrings/postgresql.gpg

- name: Add PostgreSQL apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [signed-by=/usr/share/keyrings/postgresql.gpg]
      https://apt.postgresql.org/pub/repos/apt {{ ansible_distribution_release }}-pgdg main
    filename: pgdg
    state: present

- name: Install postgresql-common (provides pg_createcluster config)
  ansible.builtin.apt:
    name: postgresql-common
    state: present

# Set encoding and locale before PostgreSQL is installed so the cluster
# auto-created by apt already uses UTF-8 — no drop/recreate needed.
- name: Configure default cluster encoding to UTF-8
  ansible.builtin.lineinfile:
    path: /etc/postgresql-common/createcluster.conf
    regexp: "^#?encoding"
    line: "encoding = UTF8"
    create: true
    owner: root
    group: root
    mode: "0644"

- name: Configure default cluster locale to C.UTF-8
  ansible.builtin.lineinfile:
    path: /etc/postgresql-common/createcluster.conf
    regexp: "^#?locale"
    line: "locale = C.UTF-8"

- name: Install PostgreSQL
  ansible.builtin.apt:
    name: "postgresql-{{ postgresql_version }}"
    state: present
    update_cache: true

- name: Ensure PostgreSQL is running
  ansible.builtin.systemd:
    name: postgresql
    state: started
    enabled: true

- name: Configure listen addresses
  ansible.builtin.lineinfile:
    path: "/etc/postgresql/{{ postgresql_version }}/main/postgresql.conf"
    regexp: "^#?listen_addresses"
    line: "listen_addresses = '*'"
  notify: Restart PostgreSQL

- name: Set default client encoding to UTF-8
  ansible.builtin.lineinfile:
    path: "/etc/postgresql/{{ postgresql_version }}/main/postgresql.conf"
    regexp: "^#?client_encoding"
    line: "client_encoding = UTF8"
  notify: Restart PostgreSQL

- name: Deploy pg_hba.conf
  ansible.builtin.template:
    src: pg_hba.conf.j2
    dest: "/etc/postgresql/{{ postgresql_version }}/main/pg_hba.conf"
    owner: postgres
    group: postgres
    mode: "0640"
  notify: Restart PostgreSQL

- name: Flush handlers to apply config before creating objects
  ansible.builtin.meta: flush_handlers

- name: Wait for PostgreSQL socket to be ready
  ansible.builtin.wait_for:
    path: /var/run/postgresql/.s.PGSQL.5432
    state: present
    timeout: 30

- name: Write user creation SQL
  ansible.builtin.template:
    src: create_user.sql.j2
    dest: /tmp/pg_create_user.sql
    owner: postgres
    group: postgres
    mode: "0600"
  no_log: true
  when: postgresql_user != "" and postgresql_password != ""

- name: Create or update application user
  ansible.builtin.command:
    cmd: psql -v ON_ERROR_STOP=1 -f /tmp/pg_create_user.sql
  become: true
  become_user: postgres
  changed_when: true
  when: postgresql_user != "" and postgresql_password != ""

- name: Remove user creation SQL
  ansible.builtin.file:
    path: /tmp/pg_create_user.sql
    state: absent

- name: Check if application database exists
  ansible.builtin.command:
    cmd: psql -tAc "SELECT 1 FROM pg_database WHERE datname = '{{ postgresql_db | replace(\"'\", \"''\") }}'"
  become: true
  become_user: postgres
  register: db_check
  changed_when: false
  when: postgresql_db != ""

- name: Create application database
  ansible.builtin.command:
    cmd: createdb -O "{{ postgresql_user }}" -E UTF8 -T template0 "{{ postgresql_db }}"
  become: true
  become_user: postgres
  changed_when: true
  when:
    - postgresql_db != ""
    - postgresql_user != ""
    - db_check.stdout != "1"