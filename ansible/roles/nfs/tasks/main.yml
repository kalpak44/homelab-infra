---
- name: Install nfs-kernel-server
  ansible.builtin.apt:
    name: nfs-kernel-server
    state: present
    update_cache: true

- name: Format data disk
  community.general.filesystem:
    fstype: ext4
    dev: "{{ nfs_data_disk }}"
    state: present

- name: Mount data disk
  ansible.builtin.mount:
    path: /srv/nfs
    src: "{{ nfs_data_disk }}"
    fstype: ext4
    opts: defaults
    state: mounted

- name: Create export directory
  ansible.builtin.file:
    path: "{{ nfs_export_path }}"
    state: directory
    owner: nobody
    group: nogroup
    mode: "0777"

- name: Configure exports
  ansible.builtin.template:
    src: exports.j2
    dest: /etc/exports
    owner: root
    group: root
    mode: "0644"
  notify: Reload exports

- name: Load nfsd kernel module
  community.general.modprobe:
    name: nfsd
    state: present

- name: Persist nfsd module across reboots
  ansible.builtin.lineinfile:
    path: /etc/modules-load.d/nfs.conf
    line: nfsd
    create: true

- name: Enable and start nfs-kernel-server
  ansible.builtin.systemd:
    name: nfs-kernel-server
    enabled: true
    state: started