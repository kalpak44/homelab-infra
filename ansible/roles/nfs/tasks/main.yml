---
- name: Install nfs-ganesha
  ansible.builtin.apt:
    name:
      - nfs-ganesha
      - nfs-ganesha-vfs
    state: present
    update_cache: true

- name: Create export directory
  ansible.builtin.file:
    path: "{{ nfs_export_path }}"
    state: directory
    owner: nobody
    group: nogroup
    mode: "0777"

- name: Configure ganesha
  ansible.builtin.template:
    src: ganesha.conf.j2
    dest: /etc/ganesha/ganesha.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart ganesha

- name: Enable and start ganesha
  ansible.builtin.systemd:
    name: nfs-ganesha
    enabled: true
    state: started