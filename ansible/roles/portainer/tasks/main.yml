---
- name: Install qemu-guest-agent
  ansible.builtin.apt:
    name: qemu-guest-agent
    state: present
    update_cache: true

- name: Ensure qemu-guest-agent is running
  ansible.builtin.systemd:
    name: qemu-guest-agent
    state: started
    enabled: true

- name: Check if data disk already has a filesystem
  ansible.builtin.command:
    cmd: blkid {{ portainer_data_disk }}
  register: disk_blkid
  changed_when: false
  failed_when: false

- name: Format data disk
  community.general.filesystem:
    fstype: ext4
    dev: "{{ portainer_data_disk }}"
    state: present
  when: disk_blkid.rc != 0

- name: Check if /mnt/data is already mounted
  ansible.builtin.command:
    cmd: mountpoint -q /mnt/data
  register: data_mountpoint
  changed_when: false
  failed_when: false

- name: Mount data disk
  ansible.builtin.mount:
    path: /mnt/data
    src: "{{ portainer_data_disk }}"
    fstype: ext4
    opts: defaults
    state: mounted
  when: data_mountpoint.rc != 0

- name: Install Docker dependencies
  ansible.builtin.apt:
    name: [ca-certificates, curl, gnupg]
    state: present

- name: Add Docker GPG key
  ansible.builtin.shell:
    cmd: >
      curl -fsSL https://download.docker.com/linux/ubuntu/gpg |
      gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg
    creates: /usr/share/keyrings/docker-archive-keyring.gpg

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch=amd64 signed-by=/usr/share/keyrings/docker-archive-keyring.gpg]
      https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable
    filename: docker
    state: present

- name: Install Docker
  ansible.builtin.apt:
    name: [docker-ce, docker-ce-cli, containerd.io]
    state: present
    update_cache: true

- name: Ensure Docker is running
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

- name: Install certbot and Cloudflare DNS plugin
  ansible.builtin.apt:
    name: [certbot, python3-certbot-dns-cloudflare]
    state: present
  when: portainer_tls_enabled

- name: Deploy Cloudflare credentials for certbot
  ansible.builtin.copy:
    dest: /etc/letsencrypt/cloudflare.ini
    content: "dns_cloudflare_api_token = {{ cloudflare_api_token }}\n"
    owner: root
    group: root
    mode: "0600"
  when: portainer_tls_enabled
  no_log: true

- name: Issue Let's Encrypt certificate
  ansible.builtin.command:
    cmd: >
      certbot certonly
      --dns-cloudflare
      --dns-cloudflare-credentials /etc/letsencrypt/cloudflare.ini
      --dns-cloudflare-propagation-seconds 30
      --non-interactive
      --agree-tos
      --email {{ letsencrypt_email }}
      -d {{ portainer_tls_domain }}
    creates: "/etc/letsencrypt/live/{{ portainer_tls_domain }}/fullchain.pem"
  when: portainer_tls_enabled and letsencrypt_email != ""

- name: Install nginx
  ansible.builtin.apt:
    name: nginx
    state: present

- name: Remove default nginx site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Restart nginx

- name: Deploy nginx configuration
  ansible.builtin.template:
    src: portainer.conf.j2
    dest: /etc/nginx/sites-available/portainer.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart nginx

- name: Enable nginx site
  ansible.builtin.file:
    src: /etc/nginx/sites-available/portainer.conf
    dest: /etc/nginx/sites-enabled/portainer.conf
    state: link
  notify: Restart nginx

- name: Deploy certbot renewal hook to reload nginx
  ansible.builtin.copy:
    dest: /etc/letsencrypt/renewal-hooks/deploy/reload-nginx.sh
    content: "#!/bin/bash\nsystemctl reload nginx\n"
    mode: "0755"
  when: portainer_tls_enabled

- name: Ensure nginx is running and reload config
  ansible.builtin.systemd:
    name: nginx
    state: reloaded
    enabled: true

- name: Check if Portainer container exists
  ansible.builtin.command:
    cmd: docker inspect portainer
  register: portainer_inspect
  changed_when: false
  failed_when: false

- name: Start Portainer container
  ansible.builtin.command:
    cmd: >
      docker run -d
      --name portainer
      --restart always
      -v /var/run/docker.sock:/var/run/docker.sock
      -v {{ portainer_data_volume }}:/data
      -p 127.0.0.1:{{ portainer_internal_port }}:9000
      portainer/portainer-ce:latest
  when: portainer_inspect.rc != 0

- name: Wait for Portainer API to be ready
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ portainer_internal_port }}/api/status"
    status_code: 200
  register: portainer_status
  until: portainer_status.status == 200
  retries: 18
  delay: 5

- name: Validate Portainer admin password length
  ansible.builtin.assert:
    that: portainer_admin_password | length >= 12
    fail_msg: "portainer_admin_password must be at least 12 characters (Portainer minimum requirement)"
  when: portainer_admin_password != ""
  no_log: true

- name: Check if Portainer admin is already initialized
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ portainer_internal_port }}/api/users/admin/check"
    method: GET
    status_code: [204, 303, 404]
  register: portainer_admin_check
  when: portainer_admin_password != ""

# 303 with AdminInitTimeout means the 5-minute init window expired — restart to reset it
- name: Restart Portainer to reset admin init timeout
  ansible.builtin.command:
    cmd: docker restart portainer
  when: portainer_admin_password != "" and portainer_admin_check.status == 303

- name: Wait for Portainer API to be ready after restart
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ portainer_internal_port }}/api/status"
    status_code: 200
  register: portainer_post_restart
  until: portainer_post_restart.status == 200
  retries: 18
  delay: 5
  when: portainer_admin_password != "" and portainer_admin_check.status == 303

- name: Initialize Portainer admin user
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ portainer_internal_port }}/api/users/admin/init"
    method: POST
    body_format: json
    body:
      Username: "{{ portainer_admin_username }}"
      Password: "{{ portainer_admin_password }}"
    status_code: [200]
  when: portainer_admin_password != "" and portainer_admin_check.status != 204
  no_log: true
  no_log: true