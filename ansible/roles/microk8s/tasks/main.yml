---
- name: Install prerequisites
  ansible.builtin.apt:
    name:
      - qemu-guest-agent
      - snapd
      - open-iscsi
      - nfs-common
      - curl
      - git
    state: present
    update_cache: true

- name: Ensure qemu-guest-agent is running
  ansible.builtin.systemd:
    name: qemu-guest-agent
    state: started
    enabled: true

- name: Disable swap
  ansible.builtin.command: swapoff -a
  changed_when: false

- name: Remove swap from fstab
  ansible.builtin.lineinfile:
    path: /etc/fstab
    regexp: '.*\bswap\b.*'
    state: absent

- name: Check installed microk8s version
  ansible.builtin.command: snap list microk8s
  register: snap_list
  changed_when: false
  failed_when: false

- name: Install microk8s snap
  ansible.builtin.command:
    cmd: "snap install microk8s --classic --channel={{ microk8s_version }}/stable"
  when: snap_list.rc != 0

- name: Refresh microk8s to target channel
  ansible.builtin.command:
    cmd: "snap refresh microk8s --channel={{ microk8s_version }}/stable"
  when:
    - snap_list.rc == 0
    - microk8s_version + '/stable' not in snap_list.stdout
  notify: Restart microk8s

- name: Add ubuntu user to microk8s group
  ansible.builtin.user:
    name: ubuntu
    groups: microk8s
    append: true

- name: Wait for microk8s to be ready
  ansible.builtin.command: microk8s status --wait-ready
  changed_when: false
  timeout: 120