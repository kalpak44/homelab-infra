---
- name: Install curl
  ansible.builtin.apt:
    name: curl
    state: present
    update_cache: true

- name: Install Ollama
  ansible.builtin.shell:
    cmd: curl -fsSL https://ollama.ai/install.sh | sh
    creates: /usr/local/bin/ollama

- name: Configure Ollama to bind on all interfaces
  ansible.builtin.lineinfile:
    path: /etc/systemd/system/ollama.service
    regexp: "^Environment="
    line: "Environment=\"OLLAMA_HOST=0.0.0.0:{{ ollama_port }}\""
    insertafter: "\\[Service\\]"
  notify: Restart Ollama

- name: Flush handlers to apply Ollama config
  ansible.builtin.meta: flush_handlers

- name: Ensure Ollama is running
  ansible.builtin.systemd:
    name: ollama
    state: started
    enabled: true
    daemon_reload: true

- name: Pull {{ ollama_model }} model
  ansible.builtin.command:
    cmd: ollama pull {{ ollama_model }}
  environment:
    OLLAMA_HOST: "0.0.0.0:{{ ollama_port }}"
  changed_when: true