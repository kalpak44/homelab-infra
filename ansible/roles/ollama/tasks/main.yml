---
- name: Install prerequisites
  ansible.builtin.apt:
    name: [curl, wget, gnupg2]
    state: present
    update_cache: true

- name: Add AMD ROCm GPG key
  ansible.builtin.shell:
    cmd: wget -qO- https://repo.radeon.com/rocm/rocm.gpg.key | gpg --dearmor > /etc/apt/keyrings/rocm.gpg
    creates: /etc/apt/keyrings/rocm.gpg

- name: Add ROCm apt repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/rocm.list
    content: "deb [arch=amd64 signed-by=/etc/apt/keyrings/rocm.gpg] https://repo.radeon.com/rocm/apt/{{ rocm_version }} noble main\n"
    mode: "0644"

- name: Install ROCm HIP libraries
  ansible.builtin.apt:
    name: rocm-hip-libraries
    state: present
    update_cache: true

- name: Install Ollama
  ansible.builtin.shell:
    cmd: curl -fsSL https://ollama.ai/install.sh | sh
    creates: /usr/local/bin/ollama

- name: Create Ollama systemd drop-in directory
  ansible.builtin.file:
    path: /etc/systemd/system/ollama.service.d
    state: directory
    mode: "0755"

- name: Configure Ollama environment
  ansible.builtin.copy:
    dest: /etc/systemd/system/ollama.service.d/override.conf
    mode: "0644"
    content: |
      [Service]
      Environment="OLLAMA_HOST=0.0.0.0:{{ ollama_port }}"
      Environment="ROCM_PATH={{ rocm_path }}"
      Environment="HSA_OVERRIDE_GFX_VERSION={{ rocm_gfx_version }}"
  notify: Restart Ollama

- name: Add ollama user to render and video groups
  ansible.builtin.user:
    name: ollama
    groups: render,video
    append: true
  notify: Restart Ollama

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Ensure Ollama is running
  ansible.builtin.systemd:
    name: ollama
    state: started
    enabled: true
    daemon_reload: true

- name: Pull {{ ollama_model }} model
  ansible.builtin.command:
    cmd: ollama pull {{ ollama_model }}
  environment:
    OLLAMA_HOST: "0.0.0.0:{{ ollama_port }}"
  changed_when: true