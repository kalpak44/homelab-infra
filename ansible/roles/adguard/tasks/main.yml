---
- name: Disable systemd-resolved
  ansible.builtin.systemd:
    name: systemd-resolved
    state: stopped
    enabled: false
  ignore_errors: true

- name: Set static resolv.conf
  ansible.builtin.copy:
    dest: /etc/resolv.conf
    content: "nameserver 1.1.1.1\n"
    owner: root
    group: root
    mode: "0644"

- name: Check if AdGuard Home binary exists
  ansible.builtin.stat:
    path: "{{ adguard_install_dir }}/AdGuardHome"
  register: adguard_binary

- name: Create install directory
  ansible.builtin.file:
    path: "{{ adguard_install_dir }}"
    state: directory
    mode: "0755"
  when: not adguard_binary.stat.exists

- name: Download AdGuard Home tarball
  ansible.builtin.get_url:
    url: "https://github.com/AdguardTeam/AdGuardHome/releases/download/v{{ adguard_version }}/AdGuardHome_linux_amd64.tar.gz"
    dest: /tmp/AdGuardHome.tar.gz
    mode: "0644"
  when: not adguard_binary.stat.exists

- name: Extract AdGuard Home
  ansible.builtin.unarchive:
    src: /tmp/AdGuardHome.tar.gz
    dest: /tmp
    remote_src: true
  when: not adguard_binary.stat.exists

- name: Move binary to install directory
  ansible.builtin.copy:
    src: /tmp/AdGuardHome/AdGuardHome
    dest: "{{ adguard_install_dir }}/AdGuardHome"
    remote_src: true
    mode: "0755"
  when: not adguard_binary.stat.exists

- name: Check if AdGuard Home service unit exists
  ansible.builtin.stat:
    path: /etc/systemd/system/AdGuardHome.service
  register: adguard_service

- name: Register AdGuard Home as a systemd service
  ansible.builtin.command:
    cmd: "{{ adguard_install_dir }}/AdGuardHome --service install"
  when: not adguard_service.stat.exists

- name: Ensure AdGuard Home service is running
  ansible.builtin.systemd:
    name: AdGuardHome
    state: started
    enabled: true
    daemon_reload: true