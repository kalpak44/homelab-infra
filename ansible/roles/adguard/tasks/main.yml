---
- name: Disable systemd-resolved
  ansible.builtin.systemd:
    name: systemd-resolved
    state: stopped
    enabled: false
  ignore_errors: true

- name: Set static resolv.conf
  ansible.builtin.copy:
    dest: /etc/resolv.conf
    content: "nameserver 1.1.1.1\n"
    owner: root
    group: root
    mode: "0644"

- name: Check if AdGuard Home is already installed
  ansible.builtin.stat:
    path: "{{ adguard_install_dir }}/AdGuardHome"
  register: adguard_binary

- name: Download and install AdGuard Home
  ansible.builtin.shell:
    cmd: curl -s -S -L https://raw.githubusercontent.com/AdguardTeam/AdGuardHome/master/scripts/install.sh | sh -s -- -v
  when: not adguard_binary.stat.exists

- name: Ensure AdGuard Home service is running
  ansible.builtin.systemd:
    name: AdGuardHome
    state: started
    enabled: true
    daemon_reload: true