---
- name: Install openssh-server
  ansible.builtin.apt:
    name: openssh-server
    state: present
    update_cache: true

- name: Disable SSH password authentication
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?PasswordAuthentication"
    line: "PasswordAuthentication no"
  notify: Restart SSH

- name: Ensure SSH is running
  ansible.builtin.systemd:
    name: ssh
    state: started
    enabled: true

- name: Disable systemd-resolved
  ansible.builtin.systemd:
    name: systemd-resolved
    state: stopped
    enabled: false
  ignore_errors: true

- name: Set static resolv.conf
  ansible.builtin.copy:
    dest: /etc/resolv.conf
    content: "nameserver 1.1.1.1\n"
    owner: root
    group: root
    mode: "0644"

- name: Install certbot and Cloudflare DNS plugin
  ansible.builtin.apt:
    name: [certbot, python3-certbot-dns-cloudflare]
    state: present
  when: adguard_tls_enabled

- name: Deploy Cloudflare credentials for certbot
  ansible.builtin.copy:
    dest: /etc/letsencrypt/cloudflare.ini
    content: "dns_cloudflare_api_token = {{ cloudflare_api_token }}\n"
    owner: root
    group: root
    mode: "0600"
  when: adguard_tls_enabled
  no_log: true

- name: Issue Let's Encrypt certificate
  ansible.builtin.command:
    cmd: >
      certbot certonly
      --dns-cloudflare
      --dns-cloudflare-credentials /etc/letsencrypt/cloudflare.ini
      --dns-cloudflare-propagation-seconds 30
      --non-interactive
      --agree-tos
      --email {{ adguard_cert_email }}
      -d {{ adguard_tls_domain }}
    creates: "{{ adguard_cert_path }}"
  when: adguard_tls_enabled and adguard_cert_email != ""

- name: Deploy certbot renewal hook to restart AdGuard
  ansible.builtin.copy:
    dest: /etc/letsencrypt/renewal-hooks/deploy/restart-adguard.sh
    content: "#!/bin/bash\nsystemctl restart AdGuardHome\n"
    mode: "0755"
  when: adguard_tls_enabled

- name: Check if AdGuard Home binary exists
  ansible.builtin.stat:
    path: "{{ adguard_install_dir }}/AdGuardHome"
  register: adguard_binary

- name: Create install directory
  ansible.builtin.file:
    path: "{{ adguard_install_dir }}"
    state: directory
    mode: "0755"
  when: not adguard_binary.stat.exists

- name: Download AdGuard Home tarball
  ansible.builtin.get_url:
    url: "https://github.com/AdguardTeam/AdGuardHome/releases/download/v{{ adguard_version }}/AdGuardHome_linux_amd64.tar.gz"
    dest: /tmp/AdGuardHome.tar.gz
    mode: "0644"
  when: not adguard_binary.stat.exists

- name: Extract AdGuard Home
  ansible.builtin.unarchive:
    src: /tmp/AdGuardHome.tar.gz
    dest: /tmp
    remote_src: true
  when: not adguard_binary.stat.exists

- name: Move binary to install directory
  ansible.builtin.copy:
    src: /tmp/AdGuardHome/AdGuardHome
    dest: "{{ adguard_install_dir }}/AdGuardHome"
    remote_src: true
    mode: "0755"
  when: not adguard_binary.stat.exists

- name: Deploy AdGuard Home configuration
  ansible.builtin.template:
    src: AdGuardHome.yaml.j2
    dest: "{{ adguard_install_dir }}/AdGuardHome.yaml"
    owner: root
    group: root
    mode: "0600"
  when: adguard_password != ""
  notify: Restart AdGuard Home

- name: Check if AdGuard Home service unit exists
  ansible.builtin.stat:
    path: /etc/systemd/system/AdGuardHome.service
  register: adguard_service

- name: Register AdGuard Home as a systemd service
  ansible.builtin.command:
    cmd: "{{ adguard_install_dir }}/AdGuardHome --service install"
  when: not adguard_service.stat.exists

- name: Ensure AdGuard Home service is running
  ansible.builtin.systemd:
    name: AdGuardHome
    state: started
    enabled: true
    daemon_reload: true