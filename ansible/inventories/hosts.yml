all:
  vars:
    ansible_user: root
    ansible_ssh_pass: "{{ lookup('env', 'HOST_PASSWORD') | default(omit) }}"
    ansible_become_pass: "{{ lookup('env', 'HOST_PASSWORD') | default(omit) }}"

  children:
    proxmox_host:
      hosts:
        proxmox:
          ansible_host: 192.168.1.50

    lxc:
      hosts:
        adguard:
          ansible_host: 192.168.1.2
        vault:
          ansible_host: 192.168.1.3
        postgres:
          ansible_host: 192.168.1.4
          postgresql_extensions: [vector]
        rabbitmq:
          ansible_host: 192.168.1.8
        cloudflared:
          ansible_host: 192.168.1.10
        redis:
          ansible_host: 192.168.1.6

    k3s:
      hosts:
        k3s-1:
          ansible_host: 192.168.1.110
        k3s-2:
          ansible_host: 192.168.1.111

    vm:
      hosts:
        nfs:
          ansible_host: 192.168.1.108
        portainer:
          ansible_host: 192.168.1.7