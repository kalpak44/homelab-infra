---
# Phase 1 — install microk8s on all nodes
- name: Install MicroK8s
  hosts: k8s
  become: true
  gather_facts: true
  roles:
    - microk8s

# Phase 2 — enable addons on primary only
- name: Configure primary node
  hosts: prod-k8s-1
  become: true
  gather_facts: false

  vars:
    addons:
      - dns
      - helm3
      - storage

  tasks:
    - name: Wait for microk8s ready
      ansible.builtin.command: microk8s status --wait-ready
      changed_when: false
      timeout: 120

    - name: Enable core addons
      ansible.builtin.command: "microk8s enable {{ item }}"
      loop: "{{ addons }}"
      register: addon_result
      changed_when: "'already enabled' not in addon_result.stdout"
      failed_when: addon_result.rc != 0

    - name: Enable MetalLB
      ansible.builtin.command: "microk8s enable metallb:{{ microk8s_metallb_range }}"
      register: metallb_result
      changed_when: "'already enabled' not in metallb_result.stdout"
      failed_when: metallb_result.rc != 0

# Phase 3 — join secondary nodes
- name: Generate join token on primary
  hosts: prod-k8s-1
  become: true
  gather_facts: false

  tasks:
    - name: Get current cluster nodes
      ansible.builtin.command: microk8s kubectl get nodes -o name
      register: cluster_nodes
      changed_when: false

    - name: Generate join token for prod-k8s-2
      ansible.builtin.command: microk8s add-node
      register: join_token_output
      changed_when: true
      when: "'node/prod-k8s-2' not in cluster_nodes.stdout"

    - name: Extract join command
      ansible.builtin.set_fact:
        microk8s_join_command: >-
          {{ join_token_output.stdout_lines
             | select('match', 'microk8s join .*')
             | list | first }}
      when: join_token_output is not skipped

- name: Join prod-k8s-2 to cluster
  hosts: prod-k8s-2
  become: true
  gather_facts: false

  tasks:
    - name: Join cluster
      ansible.builtin.command: "{{ hostvars['prod-k8s-1']['microk8s_join_command'] }}"
      when: hostvars['prod-k8s-1']['microk8s_join_command'] is defined
      changed_when: true

    - name: Wait for node to be ready
      ansible.builtin.command: microk8s status --wait-ready
      changed_when: false
      timeout: 120