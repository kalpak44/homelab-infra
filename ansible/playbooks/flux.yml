---
- name: Bootstrap Flux CD
  hosts: prod-k8s-1
  become: true

  vars:
    github_owner: kalpak44
    github_repo: homelab-infra
    github_branch: main
    flux_path: gitops/clusters/prod

  tasks:
    - name: Install Flux CLI
      ansible.builtin.shell:
        cmd: curl -s https://fluxcd.io/install.sh | bash
        creates: /usr/local/bin/flux

    - name: Check if Flux is installed
      ansible.builtin.shell:
        cmd: kubectl get namespace flux-system
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: flux_installed
      changed_when: false
      failed_when: false

    - name: Uninstall existing Flux
      ansible.builtin.shell:
        cmd: flux uninstall --silent
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      changed_when: true
      when:
        - flux_reinstall | default(false) | bool
        - flux_installed.rc == 0

    - name: Wait for flux-system namespace to be fully removed
      ansible.builtin.shell:
        cmd: kubectl get namespace flux-system
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: ns_check
      until: ns_check.rc != 0
      retries: 24
      delay: 5
      ignore_errors: true
      changed_when: false
      when:
        - flux_reinstall | default(false) | bool
        - flux_installed.rc == 0

    - name: Create cert-manager namespace
      ansible.builtin.shell:
        cmd: kubectl create namespace cert-manager --dry-run=client -o yaml | kubectl apply -f -
      changed_when: false
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Create Cloudflare API token secret
      ansible.builtin.shell:
        cmd: >-
          kubectl create secret generic cloudflare-api-token
          --namespace cert-manager
          --from-literal=api-token={{ cloudflare_api_token }}
          --dry-run=client -o yaml | kubectl apply -f -
      no_log: true
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Bootstrap Flux
      ansible.builtin.shell:
        cmd: >-
          flux bootstrap github
          --owner={{ github_owner }}
          --repository={{ github_repo }}
          --branch={{ github_branch }}
          --path={{ flux_path }}
          --token-auth
          --timeout=15m
      environment:
        GITHUB_TOKEN: "{{ flux_github_token }}"
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      ignore_errors: true

    - name: Verify Flux components are healthy
      ansible.builtin.command: flux check
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      changed_when: false