apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |
    api:
      dashboard: true

    ingressClass:
      enabled: true
      isDefaultClass: true

    providers:
      kubernetesCRD:
        enabled: true
        allowCrossNamespace: true
      kubernetesIngress:
        enabled: true

    service:
      spec:
        loadBalancerIP: "192.168.1.120"
        externalTrafficPolicy: Local
      additionalServices:
        private:
          spec:
            loadBalancerIP: "192.168.1.121"
          annotations:
            metallb.universe.tf/address-pool: homelab

    ports:
      web:
        expose:
          default: false
      websecure:
        expose:
          default: false
      public-web:
        port: 8001
        expose:
          default: true
          private: false
        exposedPort: 80
        http:
          redirections:
            entryPoint:
              to: public-web-secure
              scheme: https
              permanent: true
      public-web-secure:
        port: 8444
        expose:
          default: true
          private: false
        exposedPort: 443
        proxyProtocol:
          trustedIPs:
            - 192.168.0.0/16
        forwardedHeaders:
          trustedIPs:
            - 103.21.244.0/22
            - 103.22.200.0/22
            - 103.31.4.0/22
            - 104.16.0.0/13
            - 104.24.0.0/14
            - 108.162.192.0/18
            - 131.0.72.0/22
            - 141.101.64.0/18
            - 162.158.0.0/15
            - 172.64.0.0/13
            - 173.245.48.0/20
            - 188.114.96.0/20
            - 190.93.240.0/20
            - 197.234.240.0/22
            - 198.41.128.0/17
            - 2400:cb00::/32
            - 2606:4700::/32
            - 2803:f800::/32
            - 2405:b500::/32
            - 2405:8100::/32
            - 2a06:98c0::/29
            - 2c0f:f248::/32
        http:
          tls:
            enabled: true
            certResolver: cloudflare
          middlewares:
            - "crowdsec-bouncer@kubernetescrd"
      private-web:
        port: 8888
        expose:
          default: false
          private: true
        exposedPort: 80
        http:
          redirections:
            entryPoint:
              to: private-web-secure
              scheme: https
              permanent: true
      private-web-secure:
        port: 9443
        expose:
          default: false
          private: true
        exposedPort: 443
        http:
          tls:
            enabled: true
            certResolver: cloudflare

    logs:
      general:
        level: INFO
      access:
        enabled: true

    certificatesResolvers:
      cloudflare:
        acme:
          email: "${LETSENCRYPT_EMAIL}"
          storage: "/ssl-certs/acme.json"
          dnsChallenge:
            provider: cloudflare
            resolvers:
              - "1.1.1.1:53"

    env:
      - name: CF_DNS_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: cloudflare-api-token
            key: api-token

    persistence:
      enabled: true
      name: ssl-certs
      size: 1Gi
      accessMode: ReadWriteOnce
      path: /ssl-certs

    experimental:
      plugins:
        crowdsec-bouncer-traefik-plugin:
          moduleName: "github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin"
          version: "v1.6.0"

    volumes:
      - name: crowdsec-bouncer-secret
        mountPath: "/run/secrets/crowdsec"
        type: secret