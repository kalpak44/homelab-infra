apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |
    ingressClass:
      enabled: true
      isDefaultClass: true

    providers:
      kubernetesCRD:
        enabled: true
        allowCrossNamespace: true
      kubernetesIngress:
        enabled: true

    service:
      spec:
        loadBalancerIP: "192.168.1.120"
      additionalServices:
        private:
          spec:
            loadBalancerIP: "192.168.1.121"
          annotations:
            metallb.universe.tf/address-pool: homelab

    ports:
      web:
        expose:
          default: false
      websecure:
        expose:
          default: false
      public-web:
        port: 8001
        expose:
          default: true
          private: false
        exposedPort: 80
        http:
          redirections:
            entryPoint:
              to: public-web-secure
              scheme: https
              permanent: true
      public-web-secure:
        port: 8444
        expose:
          default: true
          private: false
        exposedPort: 443
        http:
          tls:
            enabled: true
            certResolver: cloudflare
          middlewares:
            - "crowdsec-bouncer@kubernetescrd"
      private-web:
        port: 8888
        expose:
          default: false
          private: true
        exposedPort: 80
        http:
          redirections:
            entryPoint:
              to: private-web-secure
              scheme: https
              permanent: true
      private-web-secure:
        port: 9443
        expose:
          default: false
          private: true
        exposedPort: 443
        http:
          tls:
            enabled: true
            certResolver: cloudflare

    logs:
      general:
        level: INFO

    certificatesResolvers:
      cloudflare:
        acme:
          email: "${LETSENCRYPT_EMAIL}"
          storage: "/ssl-certs/acme.json"
          dnsChallenge:
            provider: cloudflare
            resolvers:
              - "1.1.1.1:53"

    env:
      - name: CF_DNS_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: cloudflare-api-token
            key: api-token

    persistence:
      enabled: true
      name: ssl-certs
      size: 1Gi
      accessMode: ReadWriteOnce
      path: /ssl-certs

    experimental:
      plugins:
        crowdsec-bouncer-traefik-plugin:
          moduleName: "github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin"
          version: "v1.6.0"

    volumes:
      - name: crowdsec-bouncer-secret
        mountPath: "/run/secrets/crowdsec"
        type: secret