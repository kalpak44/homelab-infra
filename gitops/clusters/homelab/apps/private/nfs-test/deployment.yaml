apiVersion: apps/v1
kind: Deployment
metadata:
  name: nfs-test
  namespace: private
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nfs-test
  template:
    metadata:
      labels:
        app: nfs-test
    spec:
      containers:
        - name: writer
          image: busybox:stable
          command:
            - sh
            - -c
            - |
              echo "Starting NFS read/write test on $(hostname)"
              while true; do
                echo "$(date --iso-8601=seconds) written by $(hostname)" >> /data/test.txt
                echo "--- file contents ---"
                cat /data/test.txt
                sleep 10
              done
          volumeMounts:
            - name: nfs-volume
              mountPath: /data
      volumes:
        - name: nfs-volume
          persistentVolumeClaim:
            claimName: nfs-test-pvc