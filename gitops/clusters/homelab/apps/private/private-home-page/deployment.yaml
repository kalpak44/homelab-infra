apiVersion: apps/v1
kind: Deployment
metadata:
  name: private-home-page
  namespace: private
spec:
  replicas: 1
  selector:
    matchLabels:
      app: private-home-page
  template:
    metadata:
      labels:
        app: private-home-page
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
            - name: html
              mountPath: /usr/share/nginx/html/portainer.html
              subPath: portainer.html
      volumes:
        - name: html
          configMap:
            name: private-home-page-html