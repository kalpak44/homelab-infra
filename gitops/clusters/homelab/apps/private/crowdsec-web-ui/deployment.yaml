apiVersion: apps/v1
kind: Deployment
metadata:
  name: crowdsec-web-ui
  namespace: private
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crowdsec-web-ui
  template:
    metadata:
      labels:
        app: crowdsec-web-ui
    spec:
      containers:
        - name: crowdsec-web-ui
          image: ghcr.io/theduffman85/crowdsec-web-ui:latest
          ports:
            - containerPort: 3000
          env:
            - name: CROWDSEC_URL
              value: "http://crowdsec-service.crowdsec.svc.cluster.local:8080"
          envFrom:
            - secretRef:
                name: crowdsec-web-ui-secrets
          volumeMounts:
            - name: data
              mountPath: /app/data
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: crowdsec-web-ui-data