apiVersion: apps/v1
kind: Deployment
metadata:
  name: playwright-mcp
  namespace: private
spec:
  replicas: 1
  selector:
    matchLabels:
      app: playwright-mcp
  template:
    metadata:
      labels:
        app: playwright-mcp
    spec:
      automountServiceAccountToken: false
      containers:
        - name: playwright-mcp
          image: mcp/playwright:latest
          args:
            - --headless
            - --browser
            - chromium
            - --no-sandbox
            - --port
            - "8931"
            - --host
            - 0.0.0.0
          ports:
            - containerPort: 8931
          readinessProbe:
            tcpSocket:
              port: 8931
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi