apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopify-gpt-assistant
  namespace: public
  labels:
    app: shopify-gpt-assistant
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  minReadySeconds: 10
  selector:
    matchLabels:
      app: shopify-gpt-assistant
  template:
    metadata:
      labels:
        app: shopify-gpt-assistant
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      containers:
        - name: shopify-gpt-assistant
          image: ghcr.io/kalpak44/shopify-gpt-assistant:4afb54d
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
              ephemeral-storage: 512Mi
            limits:
              memory: 512Mi
          env:
            - name: NODE_ENV
              value: development
            - name: DEBUGG
              value: "true"
            - name: OPENAI_BASE_URL
              value: https://api.openai.com/v1
            - name: SHOPIFY_APP_URL
              value: https://shopify-gpt-assistant.pavel-usanli.online
            - name: HOST
              value: 0.0.0.0
            - name: SCOPES
              value: read_themes,write_themes,read_orders,write_orders,read_draft_orders,write_draft_orders,read_products,write_products,read_inventory,write_inventory,read_customers,write_customers,read_discounts,write_discounts,read_price_rules,write_price_rules,read_marketing_events,write_marketing_events,read_metaobjects,write_metaobjects,read_markets,write_markets,read_analytics,read_reports,write_reports,read_fulfillments,write_fulfillments,read_shipping,write_shipping,read_gift_cards,write_gift_cards,read_locations,read_publications,write_publications
            - name: SHOPIFY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: shopify-gpt-assistant-secrets
                  key: SHOPIFY_API_KEY
            - name: SHOPIFY_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: shopify-gpt-assistant-secrets
                  key: SHOPIFY_API_SECRET
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: shopify-gpt-assistant-secrets
                  key: DATABASE_URL
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: shopify-gpt-assistant-secrets
                  key: OPENAI_API_KEY

