apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: personal-web-page-http
  namespace: public
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`pavel-usanli.online`)
      kind: Rule
      middlewares:
        - name: redirect-https
      services:
        - name: personal-web-page
          port: 80