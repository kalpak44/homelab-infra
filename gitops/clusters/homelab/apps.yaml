apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  dependsOn:
    - name: traefik-config
    - name: nfs-provisioner
    - name: external-secrets-config
  interval: 30s
  path: ./gitops/clusters/homelab/apps
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system