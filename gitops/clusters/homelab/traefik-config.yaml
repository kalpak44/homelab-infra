apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: traefik-config
  namespace: flux-system
spec:
  dependsOn:
    - name: metallb-config
  interval: 10m
  path: ./gitops/clusters/homelab/infrastructure/traefik-config
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  timeout: 5m
  postBuild:
    substituteFrom:
      - kind: Secret
        name: traefik-config-vars