apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: crowdsec
  namespace: flux-system
spec:
  dependsOn:
    - name: external-secrets-config
    - name: traefik-config
  interval: 30s
  path: ./gitops/clusters/homelab/infrastructure/crowdsec
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  timeout: 5m