apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager-config
  namespace: flux-system
spec:
  dependsOn:
    - name: cert-manager
  interval: 10m
  path: ./gitops/clusters/prod/infrastructure/cert-manager-config
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system