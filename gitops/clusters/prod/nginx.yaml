apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: nginx
  namespace: flux-system
spec:
  dependsOn:
    - name: traefik
    - name: cert-manager-config
  interval: 30s
  path: ./gitops/clusters/prod/apps/nginx
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system